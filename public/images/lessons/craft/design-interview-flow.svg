<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1E293B">System Design Interview — 45 Minute Timeline</text>
  <text x="400" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Four phases to structure your answer from start to finish</text>

  <!-- Timeline base line -->
  <rect x="40" y="90" width="720" height="6" rx="3" fill="#F1F5F9"/>

  <!-- Phase progress fill -->
  <rect x="40" y="90" width="80" height="6" rx="3" fill="#EC4899"/>
  <rect x="120" y="90" width="160" height="6" fill="#3B82F6"/>
  <rect x="280" y="90" width="320" height="6" fill="#22C55E"/>
  <rect x="600" y="90" width="160" height="6" rx="3" fill="#F59E0B"/>

  <!-- Time markers -->
  <text x="40" y="82" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">0 min</text>
  <text x="120" y="82" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">5 min</text>
  <text x="280" y="82" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">15 min</text>
  <text x="600" y="82" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">35 min</text>
  <text x="740" y="82" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">45 min</text>

  <!-- Phase dots on timeline -->
  <circle cx="40" cy="93" r="8" fill="#EC4899" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="120" cy="93" r="8" fill="#3B82F6" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="280" cy="93" r="8" fill="#22C55E" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="600" cy="93" r="8" fill="#F59E0B" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Phase 1: Clarify -->
  <rect x="15" y="115" width="170" height="270" rx="10" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="15" y="115" width="170" height="40" rx="10" fill="#EC4899"/>
  <rect x="15" y="135" width="170" height="20" fill="#EC4899"/>
  <text x="100" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FDF2F8" letter-spacing="1">PHASE 1</text>
  <text x="100" y="149" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Clarify</text>
  <rect x="30" y="165" width="60" height="22" rx="11" fill="#FFFFFF" stroke="#EC4899" stroke-width="1"/>
  <text x="60" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#EC4899">5 min</text>

  <text x="30" y="205" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">Key Activities:</text>
  <circle cx="34" cy="222" r="2.5" fill="#EC4899"/>
  <text x="42" y="226" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Ask clarifying questions</text>
  <circle cx="34" cy="240" r="2.5" fill="#EC4899"/>
  <text x="42" y="244" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Define scope &amp; scale</text>
  <circle cx="34" cy="258" r="2.5" fill="#EC4899"/>
  <text x="42" y="262" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Identify constraints</text>
  <circle cx="34" cy="276" r="2.5" fill="#EC4899"/>
  <text x="42" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Confirm requirements</text>

  <rect x="28" y="295" width="145" height="30" rx="6" fill="#FFFFFF" stroke="#F9A8D4" stroke-width="1"/>
  <text x="100" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#BE185D" font-weight="500">Users? Scale? Read/Write</text>
  <text x="100" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#BE185D" font-weight="500">ratio? Latency needs?</text>

  <text x="30" y="355" font-family="system-ui, sans-serif" font-size="10" fill="#EC4899" font-weight="600">Signal: You don't jump in</text>
  <text x="30" y="368" font-family="system-ui, sans-serif" font-size="10" fill="#EC4899" font-weight="600">without understanding</text>

  <!-- Phase 2: High-Level Design -->
  <rect x="205" y="115" width="170" height="270" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="205" y="115" width="170" height="40" rx="10" fill="#3B82F6"/>
  <rect x="205" y="135" width="170" height="20" fill="#3B82F6"/>
  <text x="290" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#DBEAFE" letter-spacing="1">PHASE 2</text>
  <text x="290" y="149" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">High-Level</text>
  <rect x="220" y="165" width="60" height="22" rx="11" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1"/>
  <text x="250" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3B82F6">10 min</text>

  <text x="220" y="205" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">Key Activities:</text>
  <circle cx="224" cy="222" r="2.5" fill="#3B82F6"/>
  <text x="232" y="226" font-family="system-ui, sans-serif" font-size="10" fill="#475569">API design</text>
  <circle cx="224" cy="240" r="2.5" fill="#3B82F6"/>
  <text x="232" y="244" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Core components</text>
  <circle cx="224" cy="258" r="2.5" fill="#3B82F6"/>
  <text x="232" y="262" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Data model sketch</text>
  <circle cx="224" cy="276" r="2.5" fill="#3B82F6"/>
  <text x="232" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Basic data flow</text>

  <rect x="218" y="295" width="145" height="30" rx="6" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1"/>
  <text x="290" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1D4ED8" font-weight="500">Draw boxes &amp; arrows.</text>
  <text x="290" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1D4ED8" font-weight="500">Keep it simple first.</text>

  <text x="220" y="355" font-family="system-ui, sans-serif" font-size="10" fill="#3B82F6" font-weight="600">Signal: You see the</text>
  <text x="220" y="368" font-family="system-ui, sans-serif" font-size="10" fill="#3B82F6" font-weight="600">big picture first</text>

  <!-- Phase 3: Deep Dive -->
  <rect x="395" y="115" width="190" height="270" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="395" y="115" width="190" height="40" rx="10" fill="#22C55E"/>
  <rect x="395" y="135" width="190" height="20" fill="#22C55E"/>
  <text x="490" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#DCFCE7" letter-spacing="1">PHASE 3</text>
  <text x="490" y="149" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Deep Dive</text>
  <rect x="410" y="165" width="60" height="22" rx="11" fill="#FFFFFF" stroke="#22C55E" stroke-width="1"/>
  <text x="440" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22C55E">20 min</text>

  <text x="410" y="205" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">Key Activities:</text>
  <circle cx="414" cy="222" r="2.5" fill="#22C55E"/>
  <text x="422" y="226" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Database schema detail</text>
  <circle cx="414" cy="240" r="2.5" fill="#22C55E"/>
  <text x="422" y="244" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Scaling strategies</text>
  <circle cx="414" cy="258" r="2.5" fill="#22C55E"/>
  <text x="422" y="262" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Caching layer design</text>
  <circle cx="414" cy="276" r="2.5" fill="#22C55E"/>
  <text x="422" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Failure handling</text>
  <circle cx="414" cy="294" r="2.5" fill="#22C55E"/>
  <text x="422" y="298" font-family="system-ui, sans-serif" font-size="10" fill="#475569">AI/ML pipeline (if relevant)</text>

  <rect x="408" y="310" width="165" height="30" rx="6" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
  <text x="490" y="327" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534" font-weight="500">This is where you show</text>
  <text x="490" y="337" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534" font-weight="500">depth. Pick 2-3 areas.</text>

  <text x="410" y="365" font-family="system-ui, sans-serif" font-size="10" fill="#22C55E" font-weight="600">Signal: Technical depth</text>
  <text x="410" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#22C55E" font-weight="600">and trade-off awareness</text>

  <!-- Phase 4: Wrap Up -->
  <rect x="605" y="115" width="175" height="270" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="605" y="115" width="175" height="40" rx="10" fill="#F59E0B"/>
  <rect x="605" y="135" width="175" height="20" fill="#F59E0B"/>
  <text x="692" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FEF3C7" letter-spacing="1">PHASE 4</text>
  <text x="692" y="149" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Wrap Up</text>
  <rect x="620" y="165" width="60" height="22" rx="11" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1"/>
  <text x="650" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#F59E0B">10 min</text>

  <text x="620" y="205" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">Key Activities:</text>
  <circle cx="624" cy="222" r="2.5" fill="#F59E0B"/>
  <text x="632" y="226" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Summarise design</text>
  <circle cx="624" cy="240" r="2.5" fill="#F59E0B"/>
  <text x="632" y="244" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Discuss trade-offs</text>
  <circle cx="624" cy="258" r="2.5" fill="#F59E0B"/>
  <text x="632" y="262" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Future improvements</text>
  <circle cx="624" cy="276" r="2.5" fill="#F59E0B"/>
  <text x="632" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Address edge cases</text>

  <rect x="618" y="295" width="150" height="30" rx="6" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1"/>
  <text x="693" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400E" font-weight="500">Show maturity by</text>
  <text x="693" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400E" font-weight="500">acknowledging limits.</text>

  <text x="620" y="355" font-family="system-ui, sans-serif" font-size="10" fill="#F59E0B" font-weight="600">Signal: Mature engineer</text>
  <text x="620" y="368" font-family="system-ui, sans-serif" font-size="10" fill="#F59E0B" font-weight="600">who knows trade-offs</text>
</svg>
