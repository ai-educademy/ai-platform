<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Sorting &amp; Searching — Visual Comparison</text>

  <!-- MERGE SORT SECTION (Left) -->
  <text x="210" y="55" text-anchor="middle" font-size="14" font-weight="600" fill="#F97316">Merge Sort — Divide &amp; Conquer</text>
  <text x="210" y="70" text-anchor="middle" font-size="11" fill="#64748B">O(n log n) — splits then merges sorted halves</text>

  <!-- Level 0: Full array -->
  <rect x="100" y="80" width="30" height="24" rx="3" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="115" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">38</text>
  <rect x="134" y="80" width="30" height="24" rx="3" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="149" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">27</text>
  <rect x="168" y="80" width="30" height="24" rx="3" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="183" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">43</text>
  <rect x="202" y="80" width="30" height="24" rx="3" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="217" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">3</text>
  <rect x="236" y="80" width="30" height="24" rx="3" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="251" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">9</text>
  <rect x="270" y="80" width="30" height="24" rx="3" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="285" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">82</text>

  <!-- DIVIDE arrows -->
  <text x="50" y="125" font-size="10" fill="#EF4444" font-weight="600">DIVIDE</text>
  <line x1="175" y1="108" x2="132" y2="128" stroke="#EF4444" stroke-width="1.5"/>
  <line x1="250" y1="108" x2="285" y2="128" stroke="#EF4444" stroke-width="1.5"/>

  <!-- Level 1: Two halves -->
  <rect x="68" y="132" width="28" height="22" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="82" y="148" text-anchor="middle" font-size="11" fill="#1E293B">38</text>
  <rect x="100" y="132" width="28" height="22" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="114" y="148" text-anchor="middle" font-size="11" fill="#1E293B">27</text>
  <rect x="132" y="132" width="28" height="22" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="146" y="148" text-anchor="middle" font-size="11" fill="#1E293B">43</text>

  <rect x="232" y="132" width="28" height="22" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="246" y="148" text-anchor="middle" font-size="11" fill="#1E293B">3</text>
  <rect x="264" y="132" width="28" height="22" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="278" y="148" text-anchor="middle" font-size="11" fill="#1E293B">9</text>
  <rect x="296" y="132" width="28" height="22" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="310" y="148" text-anchor="middle" font-size="11" fill="#1E293B">82</text>

  <!-- Level 2: Individual -->
  <line x1="114" y1="158" x2="82" y2="170" stroke="#EF4444" stroke-width="1"/>
  <line x1="114" y1="158" x2="146" y2="170" stroke="#EF4444" stroke-width="1"/>
  <line x1="278" y1="158" x2="246" y2="170" stroke="#EF4444" stroke-width="1"/>
  <line x1="278" y1="158" x2="310" y2="170" stroke="#EF4444" stroke-width="1"/>

  <rect x="62" y="174" width="24" height="20" rx="3" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="74" y="188" text-anchor="middle" font-size="10" fill="#1E293B">38</text>
  <rect x="94" y="174" width="24" height="20" rx="3" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="106" y="188" text-anchor="middle" font-size="10" fill="#1E293B">27</text>
  <rect x="136" y="174" width="24" height="20" rx="3" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="148" y="188" text-anchor="middle" font-size="10" fill="#1E293B">43</text>

  <rect x="228" y="174" width="24" height="20" rx="3" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="240" y="188" text-anchor="middle" font-size="10" fill="#1E293B">3</text>
  <rect x="260" y="174" width="24" height="20" rx="3" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="272" y="188" text-anchor="middle" font-size="10" fill="#1E293B">9</text>
  <rect x="296" y="174" width="24" height="20" rx="3" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="308" y="188" text-anchor="middle" font-size="10" fill="#1E293B">82</text>

  <!-- MERGE arrows -->
  <text x="50" y="218" font-size="10" fill="#10B981" font-weight="600">MERGE</text>
  <line x1="82" y1="198" x2="98" y2="210" stroke="#10B981" stroke-width="1.5"/>
  <line x1="106" y1="198" x2="98" y2="210" stroke="#10B981" stroke-width="1.5"/>
  <line x1="240" y1="198" x2="266" y2="210" stroke="#10B981" stroke-width="1.5"/>
  <line x1="272" y1="198" x2="266" y2="210" stroke="#10B981" stroke-width="1.5"/>

  <!-- Level 3: Merged pairs -->
  <rect x="68" y="215" width="28" height="20" rx="3" fill="#DCFCE7" stroke="#10B981" stroke-width="1.2"/>
  <text x="82" y="229" text-anchor="middle" font-size="10" fill="#1E293B">27</text>
  <rect x="100" y="215" width="28" height="20" rx="3" fill="#DCFCE7" stroke="#10B981" stroke-width="1.2"/>
  <text x="114" y="229" text-anchor="middle" font-size="10" fill="#1E293B">38</text>
  <rect x="136" y="215" width="24" height="20" rx="3" fill="#DCFCE7" stroke="#10B981" stroke-width="1.2"/>
  <text x="148" y="229" text-anchor="middle" font-size="10" fill="#1E293B">43</text>

  <rect x="228" y="215" width="28" height="20" rx="3" fill="#DCFCE7" stroke="#10B981" stroke-width="1.2"/>
  <text x="242" y="229" text-anchor="middle" font-size="10" fill="#1E293B">3</text>
  <rect x="260" y="215" width="28" height="20" rx="3" fill="#DCFCE7" stroke="#10B981" stroke-width="1.2"/>
  <text x="274" y="229" text-anchor="middle" font-size="10" fill="#1E293B">9</text>
  <rect x="296" y="215" width="24" height="20" rx="3" fill="#DCFCE7" stroke="#10B981" stroke-width="1.2"/>
  <text x="308" y="229" text-anchor="middle" font-size="10" fill="#1E293B">82</text>

  <!-- Final merge -->
  <line x1="130" y1="240" x2="198" y2="254" stroke="#10B981" stroke-width="1.5"/>
  <line x1="270" y1="240" x2="220" y2="254" stroke="#10B981" stroke-width="1.5"/>

  <!-- Level 4: Fully sorted -->
  <rect x="100" y="258" width="30" height="24" rx="4" fill="#10B981" stroke="none"/>
  <text x="115" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">3</text>
  <rect x="134" y="258" width="30" height="24" rx="4" fill="#10B981" stroke="none"/>
  <text x="149" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">9</text>
  <rect x="168" y="258" width="30" height="24" rx="4" fill="#10B981" stroke="none"/>
  <text x="183" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">27</text>
  <rect x="202" y="258" width="30" height="24" rx="4" fill="#10B981" stroke="none"/>
  <text x="217" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">38</text>
  <rect x="236" y="258" width="30" height="24" rx="4" fill="#10B981" stroke="none"/>
  <text x="251" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">43</text>
  <rect x="270" y="258" width="30" height="24" rx="4" fill="#10B981" stroke="none"/>
  <text x="285" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">82</text>

  <text x="210" y="298" text-anchor="middle" font-size="11" fill="#10B981" font-weight="700">Sorted!</text>

  <!-- Divider -->
  <line x1="400" y1="48" x2="400" y2="340" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- BINARY SEARCH SECTION (Right) -->
  <text x="600" y="55" text-anchor="middle" font-size="14" font-weight="600" fill="#F97316">Binary Search — Find 23</text>
  <text x="600" y="70" text-anchor="middle" font-size="11" fill="#64748B">O(log n) — eliminate half each step</text>

  <!-- Sorted array -->
  <rect x="430" y="80" width="34" height="26" rx="3" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="447" y="98" text-anchor="middle" font-size="11" fill="#1E293B">2</text>
  <rect x="468" y="80" width="34" height="26" rx="3" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="485" y="98" text-anchor="middle" font-size="11" fill="#1E293B">5</text>
  <rect x="506" y="80" width="34" height="26" rx="3" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="523" y="98" text-anchor="middle" font-size="11" fill="#1E293B">11</text>
  <rect x="544" y="80" width="34" height="26" rx="3" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="561" y="98" text-anchor="middle" font-size="11" fill="#1E293B">15</text>
  <rect x="582" y="80" width="34" height="26" rx="3" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="599" y="98" text-anchor="middle" font-size="11" fill="#1E293B">23</text>
  <rect x="620" y="80" width="34" height="26" rx="3" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="637" y="98" text-anchor="middle" font-size="11" fill="#1E293B">37</text>
  <rect x="658" y="80" width="34" height="26" rx="3" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="675" y="98" text-anchor="middle" font-size="11" fill="#1E293B">41</text>
  <rect x="696" y="80" width="34" height="26" rx="3" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="713" y="98" text-anchor="middle" font-size="11" fill="#1E293B">56</text>

  <!-- Step 1: mid=15, target>mid, go right -->
  <text x="432" y="130" font-size="11" font-weight="600" fill="#1E293B">Step 1:</text>
  <text x="487" y="130" font-size="11" fill="#64748B">mid=15, target 23 &gt; 15</text>
  <rect x="430" y="136" width="152" height="22" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" opacity="0.6"/>
  <text x="506" y="152" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="600">ELIMINATED</text>
  <rect x="582" y="136" width="148" height="22" rx="4" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="656" y="152" text-anchor="middle" font-size="10" fill="#10B981" font-weight="600">SEARCH HERE</text>

  <!-- Step 2: mid=37, target<mid, go left -->
  <text x="432" y="180" font-size="11" font-weight="600" fill="#1E293B">Step 2:</text>
  <text x="487" y="180" font-size="11" fill="#64748B">mid=37, target 23 &lt; 37</text>
  <rect x="582" y="186" width="72" height="22" rx="4" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="618" y="202" text-anchor="middle" font-size="10" fill="#10B981" font-weight="600">SEARCH</text>
  <rect x="658" y="186" width="72" height="22" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" opacity="0.6"/>
  <text x="694" y="202" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="600">ELIMINATED</text>

  <!-- Step 3: Found! -->
  <text x="432" y="232" font-size="11" font-weight="600" fill="#1E293B">Step 3:</text>
  <text x="487" y="232" font-size="11" fill="#64748B">mid=23 == target</text>
  <rect x="582" y="238" width="34" height="28" rx="6" fill="#F97316" stroke="none"/>
  <text x="599" y="257" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">23</text>
  <text x="630" y="257" font-size="12" fill="#10B981" font-weight="700">FOUND!</text>

  <!-- Complexity comparison box -->
  <rect x="430" y="278" width="345" height="60" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="445" y="296" font-size="12" font-weight="600" fill="#1E293B">Time Complexity Comparison</text>
  <rect x="445" y="304" width="100" height="18" rx="3" fill="#FEE2E2"/>
  <text x="495" y="317" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="600">Linear: O(n)</text>
  <rect x="445" y="324" width="32" height="8" rx="2" fill="#10B981"/>
  <text x="495" y="335" text-anchor="middle" font-size="10" fill="#10B981" font-weight="600">Binary: O(log n)</text>
  <text x="600" y="317" font-size="10" fill="#64748B">8 elements = 8 checks</text>
  <text x="600" y="335" font-size="10" fill="#64748B">8 elements = 3 checks</text>

  <!-- AI Connection Banner -->
  <rect x="30" y="365" width="740" height="28" rx="6" fill="#1E293B"/>
  <text x="50" y="384" font-size="12" fill="#F97316" font-weight="700">AI CONNECTION</text>
  <text x="175" y="384" font-size="12" fill="#E2E8F0">Search engines use sorted indexes + binary search for sub-millisecond query responses</text>
</svg>
