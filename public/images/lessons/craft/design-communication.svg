<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1E293B">What Interviewers Look For</text>
  <text x="400" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Five dimensions of evaluation in system design interviews</text>

  <!-- Row 1 -->
  <!-- Card 1: Structured Thinking -->
  <rect x="25" y="70" width="230" height="145" rx="10" fill="#FFFFFF" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="35" y="80" width="42" height="42" rx="21" fill="#FDF2F8"/>
  <text x="56" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#EC4899" font-weight="700">1</text>
  <text x="88" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Structured</text>
  <text x="88" y="113" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Thinking</text>
  <!-- Score bar -->
  <rect x="35" y="128" width="205" height="6" rx="3" fill="#F1F5F9"/>
  <rect x="35" y="128" width="185" height="6" rx="3" fill="#EC4899"/>
  <text x="225" y="127" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#EC4899" font-weight="600">HIGH</text>
  <text x="35" y="152" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Top-down approach</text>
  <text x="35" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Clear framework visible</text>
  <text x="35" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Logical progression</text>
  <text x="35" y="194" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Prioritises effectively</text>

  <!-- Card 2: Trade-off Analysis -->
  <rect x="285" y="70" width="230" height="145" rx="10" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="295" y="80" width="42" height="42" rx="21" fill="#EFF6FF"/>
  <text x="316" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#3B82F6" font-weight="700">2</text>
  <text x="348" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Trade-off</text>
  <text x="348" y="113" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Analysis</text>
  <rect x="295" y="128" width="205" height="6" rx="3" fill="#F1F5F9"/>
  <rect x="295" y="128" width="195" height="6" rx="3" fill="#3B82F6"/>
  <text x="485" y="127" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#3B82F6" font-weight="600">HIGH</text>
  <text x="295" y="152" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Discusses alternatives</text>
  <text x="295" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Explains WHY over WHAT</text>
  <text x="295" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- CAP theorem awareness</text>
  <text x="295" y="194" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Cost vs performance</text>

  <!-- Card 3: Scalability -->
  <rect x="545" y="70" width="230" height="145" rx="10" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="555" y="80" width="42" height="42" rx="21" fill="#F0FDF4"/>
  <text x="576" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#22C55E" font-weight="700">3</text>
  <text x="608" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Scalability</text>
  <text x="608" y="113" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Awareness</text>
  <rect x="555" y="128" width="205" height="6" rx="3" fill="#F1F5F9"/>
  <rect x="555" y="128" width="170" height="6" rx="3" fill="#22C55E"/>
  <text x="745" y="127" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#22C55E" font-weight="600">MEDIUM-HIGH</text>
  <text x="555" y="152" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Handles 10x growth</text>
  <text x="555" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Identifies bottlenecks</text>
  <text x="555" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Horizontal vs vertical</text>
  <text x="555" y="194" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Caching &amp; partitioning</text>

  <!-- Row 2 -->
  <!-- Card 4: Communication -->
  <rect x="155" y="235" width="230" height="145" rx="10" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="165" y="245" width="42" height="42" rx="21" fill="#FEF3C7"/>
  <text x="186" y="271" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#F59E0B" font-weight="700">4</text>
  <text x="218" y="262" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Communication</text>
  <text x="218" y="278" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Clarity</text>
  <rect x="165" y="293" width="205" height="6" rx="3" fill="#F1F5F9"/>
  <rect x="165" y="293" width="195" height="6" rx="3" fill="#F59E0B"/>
  <text x="355" y="292" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#F59E0B" font-weight="600">HIGH</text>
  <text x="165" y="317" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Thinking out loud</text>
  <text x="165" y="331" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Clean diagrams</text>
  <text x="165" y="345" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Checks in with interviewer</text>
  <text x="165" y="359" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Summarises clearly</text>

  <!-- Card 5: Technical Depth -->
  <rect x="415" y="235" width="230" height="145" rx="10" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="425" y="245" width="42" height="42" rx="21" fill="#F3E8FF"/>
  <text x="446" y="271" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#8B5CF6" font-weight="700">5</text>
  <text x="478" y="262" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Technical</text>
  <text x="478" y="278" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Depth</text>
  <rect x="425" y="293" width="205" height="6" rx="3" fill="#F1F5F9"/>
  <rect x="425" y="293" width="160" height="6" rx="3" fill="#8B5CF6"/>
  <text x="615" y="292" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8B5CF6" font-weight="600">MEDIUM-HIGH</text>
  <text x="425" y="317" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Knows system internals</text>
  <text x="425" y="331" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Real-world experience</text>
  <text x="425" y="345" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Correct use of patterns</text>
  <text x="425" y="359" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- AI/ML system awareness</text>
</svg>
