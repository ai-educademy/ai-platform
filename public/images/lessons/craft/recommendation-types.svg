<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FAFAFE"/>
  <text x="400" y="30" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700" fill="#1E1B4B">Recommendation Approaches — Visual Comparison</text>

  <!-- Panel 1: Collaborative Filtering -->
  <rect x="20" y="50" width="240" height="420" rx="12" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="20" y="50" width="240" height="40" rx="12" fill="#8B5CF6"/>
  <rect x="20" y="75" width="240" height="15" fill="#8B5CF6"/>
  <text x="140" y="76" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="white">Collaborative Filtering</text>

  <text x="140" y="115" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#5B21B6">"Users like you also liked..."</text>

  <!-- User circles -->
  <circle cx="70" cy="160" r="20" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="70" y="164" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#5B21B6">You</text>
  <circle cx="140" cy="155" r="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="140" y="159" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#1D4ED8">User B</text>
  <circle cx="210" cy="160" r="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="210" y="164" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#1D4ED8">User C</text>
  <!-- Similarity lines -->
  <line x1="90" y1="160" x2="122" y2="157" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="90" y1="162" x2="192" y2="162" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="140" y="183" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#7C3AED">Similar taste (cosine sim: 0.92)</text>

  <!-- Items -->
  <rect x="40" y="200" width="70" height="28" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
  <text x="75" y="218" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#047857">Movie A</text>
  <rect x="120" y="200" width="70" height="28" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
  <text x="155" y="218" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#047857">Movie B</text>
  <rect x="40" y="236" width="70" height="28" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="75" y="254" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#B45309">Movie C ?</text>
  <!-- Stars -->
  <text x="200" y="214" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#F59E0B">5/5</text>
  <text x="200" y="252" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#9CA3AF">???</text>

  <text x="140" y="290" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#047857">Pros:</text>
  <text x="140" y="305" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">No item metadata needed</text>
  <text x="140" y="318" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">Discovers novel items</text>
  <text x="140" y="340" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#DC2626">Cons:</text>
  <text x="140" y="355" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">Cold start problem</text>
  <text x="140" y="368" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">Sparse data issues</text>

  <text x="140" y="400" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#5B21B6">Used by: Netflix, Spotify</text>
  <text x="140" y="416" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#7C3AED">Matrix factorization / ALS</text>
  <text x="140" y="432" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#7C3AED">User-User / Item-Item similarity</text>
  <text x="140" y="455" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5B21B6">Accuracy: High</text>

  <!-- Panel 2: Content-Based -->
  <rect x="280" y="50" width="240" height="420" rx="12" fill="white" stroke="#14B8A6" stroke-width="2"/>
  <rect x="280" y="50" width="240" height="40" rx="12" fill="#14B8A6"/>
  <rect x="280" y="75" width="240" height="15" fill="#14B8A6"/>
  <text x="400" y="76" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="white">Content-Based Filtering</text>

  <text x="400" y="115" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#0F766E">"Similar to items you liked..."</text>

  <!-- Item features -->
  <rect x="300" y="140" width="100" height="70" rx="8" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/>
  <text x="350" y="158" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#0F766E">Movie A</text>
  <text x="350" y="174" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#0D9488">Genre: Sci-Fi</text>
  <text x="350" y="186" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#0D9488">Director: Nolan</text>
  <text x="350" y="198" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#0D9488">Rating: PG-13</text>

  <rect x="420" y="140" width="80" height="70" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="460" y="158" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#B45309">Movie D</text>
  <text x="460" y="174" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#D97706">Genre: Sci-Fi</text>
  <text x="460" y="186" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#D97706">Director: Villeneuve</text>
  <text x="460" y="198" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#D97706">Rating: PG-13</text>

  <!-- Feature vectors -->
  <text x="400" y="230" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#0F766E">Feature Vector Match</text>
  <rect x="300" y="238" width="200" height="24" rx="4" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
  <text x="400" y="254" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#047857">[1,0,1,0,1] ~ [1,0,1,1,1] = 0.87</text>

  <text x="400" y="290" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#047857">Pros:</text>
  <text x="400" y="305" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">No cold start for items</text>
  <text x="400" y="318" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">Transparent / explainable</text>
  <text x="400" y="340" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#DC2626">Cons:</text>
  <text x="400" y="355" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">Over-specialization</text>
  <text x="400" y="368" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">Needs good metadata</text>

  <text x="400" y="400" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#0F766E">Used by: YouTube, Amazon</text>
  <text x="400" y="416" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#0D9488">TF-IDF, Word2Vec, BERT</text>
  <text x="400" y="432" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#0D9488">Cosine similarity on features</text>
  <text x="400" y="455" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#0F766E">Diversity: Low</text>

  <!-- Panel 3: Hybrid -->
  <rect x="540" y="50" width="240" height="420" rx="12" fill="white" stroke="#EC4899" stroke-width="2"/>
  <rect x="540" y="50" width="240" height="40" rx="12" fill="#EC4899"/>
  <rect x="540" y="75" width="240" height="15" fill="#EC4899"/>
  <text x="660" y="76" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="white">Hybrid (Best of Both)</text>

  <text x="660" y="115" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#BE185D">"Smart blend of signals..."</text>

  <!-- Hybrid diagram -->
  <rect x="560" y="138" width="80" height="30" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="600" y="157" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#5B21B6">Collab Score</text>
  <rect x="560" y="178" width="80" height="30" rx="6" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1"/>
  <text x="600" y="197" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#0F766E">Content Score</text>
  <rect x="560" y="218" width="80" height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="600" y="237" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#B45309">Context</text>

  <!-- Arrows to combiner -->
  <line x1="640" y1="153" x2="680" y2="190" stroke="#8B5CF6" stroke-width="1"/>
  <line x1="640" y1="193" x2="680" y2="193" stroke="#14B8A6" stroke-width="1"/>
  <line x1="640" y1="233" x2="680" y2="196" stroke="#F59E0B" stroke-width="1"/>

  <!-- Combiner -->
  <rect x="682" y="175" width="80" height="38" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="2"/>
  <text x="722" y="192" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700" fill="#BE185D">ML Ranker</text>
  <text x="722" y="206" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#DB2777">Neural Net</text>

  <!-- Output -->
  <rect x="592" y="258" width="136" height="28" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="660" y="276" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#047857">Final Ranked List</text>
  <line x1="722" y1="213" x2="695" y2="256" stroke="#EC4899" stroke-width="1.5" marker-end="url(#recPink)"/>

  <text x="660" y="310" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#047857">Pros:</text>
  <text x="660" y="325" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">Best accuracy + diversity</text>
  <text x="660" y="338" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">Handles cold start better</text>
  <text x="660" y="360" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#DC2626">Cons:</text>
  <text x="660" y="375" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">Complex to build/maintain</text>
  <text x="660" y="388" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#6B7280">Needs more compute</text>

  <text x="660" y="412" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#BE185D">Used by: Netflix, TikTok</text>
  <text x="660" y="428" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#DB2777">Deep learning, transformers</text>
  <text x="660" y="442" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#DB2777">Two-tower models, attention</text>
  <text x="660" y="455" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#BE185D">Industry Standard</text>

  <defs>
    <marker id="recPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#EC4899"/></marker>
  </defs>
</svg>
