<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FAFAFE"/>
  <text x="400" y="32" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700" fill="#1E1B4B">Token Bucket Algorithm — Rate Limiting</text>

  <!-- Bucket outline -->
  <path d="M250,100 L230,420 L570,420 L550,100 Z" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Bucket water level (tokens) -->
  <path d="M238,240 L234,420 L566,420 L562,240 Z" fill="#C4B5FD" opacity="0.5"/>
  <!-- Bucket label -->
  <text x="400" y="85" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700" fill="#5B21B6">Token Bucket</text>
  <text x="400" y="135" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#7C3AED">Max Capacity: 10 tokens</text>

  <!-- Tokens inside bucket -->
  <circle cx="310" cy="380" r="16" fill="#8B5CF6" stroke="#6D28D9" stroke-width="1.5"/>
  <text x="310" y="385" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <circle cx="350" cy="375" r="16" fill="#8B5CF6" stroke="#6D28D9" stroke-width="1.5"/>
  <text x="350" y="380" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <circle cx="390" cy="385" r="16" fill="#8B5CF6" stroke="#6D28D9" stroke-width="1.5"/>
  <text x="390" y="390" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <circle cx="430" cy="378" r="16" fill="#8B5CF6" stroke="#6D28D9" stroke-width="1.5"/>
  <text x="430" y="383" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <circle cx="470" cy="382" r="16" fill="#8B5CF6" stroke="#6D28D9" stroke-width="1.5"/>
  <text x="470" y="387" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <!-- Row 2 -->
  <circle cx="330" cy="340" r="16" fill="#A78BFA" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="330" y="345" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <circle cx="370" cy="335" r="16" fill="#A78BFA" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="370" y="340" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <circle cx="420" cy="340" r="16" fill="#A78BFA" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="420" y="345" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <!-- Row 3 -->
  <circle cx="360" cy="296" r="16" fill="#C4B5FD" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="360" y="301" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <circle cx="410" cy="296" r="16" fill="#C4B5FD" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="410" y="301" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <!-- Current count -->
  <text x="400" y="265" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#5B21B6">Current: 10/10 tokens</text>

  <!-- Refill arrow (left side) -->
  <rect x="30" y="160" width="140" height="70" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="100" y="182" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#047857">Token Refill</text>
  <text x="100" y="200" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#059669">Rate: 5 tokens/sec</text>
  <text x="100" y="216" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#059669">Steady drip into bucket</text>
  <!-- Arrow refill → bucket -->
  <line x1="170" y1="195" x2="248" y2="195" stroke="#10B981" stroke-width="2" marker-end="url(#aTkGreen)"/>
  <text x="210" y="188" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#10B981">+tokens</text>

  <!-- Overflow label -->
  <rect x="30" y="280" width="140" height="45" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="100" y="300" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#DC2626">Overflow Discarded</text>
  <text x="100" y="315" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#EF4444">If bucket is full, discard</text>

  <!-- Request incoming (right side) -->
  <rect x="620" y="110" width="150" height="56" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="695" y="132" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#5B21B6">Incoming Request</text>
  <text x="695" y="152" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#7C3AED">POST /api/shorten</text>
  <!-- Arrow request → bucket -->
  <line x1="620" y1="140" x2="552" y2="160" stroke="#8B5CF6" stroke-width="2" marker-end="url(#aTkPurple)"/>
  <text x="590" y="142" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#8B5CF6">-1 token</text>

  <!-- Allowed -->
  <rect x="620" y="200" width="150" height="50" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="695" y="222" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#047857">200 OK</text>
  <text x="695" y="240" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#059669">Token available: ALLOW</text>
  <line x1="695" y1="166" x2="695" y2="198" stroke="#10B981" stroke-width="1.5" marker-end="url(#aTkGreen)"/>

  <!-- Rejected -->
  <rect x="620" y="280" width="150" height="50" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="695" y="302" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#DC2626">429 Too Many</text>
  <text x="695" y="320" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#EF4444">No tokens left: REJECT</text>
  <line x1="695" y1="250" x2="695" y2="278" stroke="#EF4444" stroke-width="1.5" marker-end="url(#aTkRed)"/>

  <!-- Parameters box -->
  <rect x="40" y="430" width="720" height="55" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="60" y="450" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#374151">Key Parameters:</text>
  <text x="60" y="468" font-family="'Courier New',monospace" font-size="10" fill="#6B7280">bucket_size = 10 (max burst) | refill_rate = 5/sec (sustained) | tokens_per_request = 1</text>
  <text x="60" y="480" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#9CA3AF">Allows bursts up to 10 requests, then sustains 5 req/sec. Used by: Stripe, AWS API Gateway, Cloudflare</text>

  <defs>
    <marker id="aTkPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8B5CF6"/></marker>
    <marker id="aTkGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#10B981"/></marker>
    <marker id="aTkRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#EF4444"/></marker>
  </defs>
</svg>
