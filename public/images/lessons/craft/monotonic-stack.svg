<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="bold" fill="#0F172A">Monotonic Stack — Next Greater Element</text>
  <text x="400" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Input: [2, 1, 5, 3, 4]  |  Find the next greater element for each position</text>

  <!-- Column headers -->
  <text x="80" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#64748B">Step</text>
  <text x="250" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#64748B">Array (current in cyan)</text>
  <text x="530" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#64748B">Stack (decreasing)</text>
  <text x="710" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#64748B">Result</text>

  <!-- Separator -->
  <line x1="30" y1="86" x2="770" y2="86" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Step 1: Process 2 -->
  <text x="80" y="115" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748B">i=0</text>
  <!-- Array -->
  <rect x="165" y="95" width="36" height="30" rx="4" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
  <text x="183" y="115" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff">2</text>
  <rect x="207" y="95" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="225" y="115" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">1</text>
  <rect x="249" y="95" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="267" y="115" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">5</text>
  <rect x="291" y="95" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="309" y="115" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">3</text>
  <rect x="333" y="95" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="351" y="115" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">4</text>
  <!-- Stack: push 2 -->
  <rect x="490" y="95" width="36" height="30" rx="4" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
  <text x="508" y="115" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff">2</text>
  <text x="540" y="115" font-family="system-ui, sans-serif" font-size="11" fill="#10B981">push 2</text>
  <!-- Result -->
  <text x="710" y="115" text-anchor="middle" font-family="monospace" font-size="12" fill="#94A3B8">[ _, _, _, _, _ ]</text>

  <!-- Step 2: Process 1 -->
  <text x="80" y="165" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748B">i=1</text>
  <rect x="165" y="145" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="183" y="165" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">2</text>
  <rect x="207" y="145" width="36" height="30" rx="4" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
  <text x="225" y="165" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff">1</text>
  <rect x="249" y="145" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="267" y="165" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">5</text>
  <rect x="291" y="145" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="309" y="165" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">3</text>
  <rect x="333" y="145" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="351" y="165" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">4</text>
  <!-- Stack: [2, 1] -->
  <rect x="490" y="145" width="36" height="30" rx="4" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1"/>
  <text x="508" y="165" text-anchor="middle" font-family="monospace" font-size="13" fill="#475569">2</text>
  <rect x="530" y="145" width="36" height="30" rx="4" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
  <text x="548" y="165" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff">1</text>
  <text x="580" y="165" font-family="system-ui, sans-serif" font-size="11" fill="#10B981">push 1</text>
  <text x="710" y="165" text-anchor="middle" font-family="monospace" font-size="12" fill="#94A3B8">[ _, _, _, _, _ ]</text>

  <!-- Step 3: Process 5 — pops 1 and 2! -->
  <text x="80" y="218" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748B">i=2</text>
  <rect x="165" y="198" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="183" y="218" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">2</text>
  <rect x="207" y="198" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="225" y="218" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">1</text>
  <rect x="249" y="198" width="36" height="30" rx="4" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
  <text x="267" y="218" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff">5</text>
  <rect x="291" y="198" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="309" y="218" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">3</text>
  <rect x="333" y="198" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="351" y="218" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">4</text>
  <!-- Stack: pops, then push 5 -->
  <rect x="490" y="198" width="36" height="30" rx="4" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
  <text x="508" y="218" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff">5</text>
  <text x="540" y="211" font-family="system-ui, sans-serif" font-size="11" fill="#EF4444">pop 1 (NGE=5)</text>
  <text x="540" y="225" font-family="system-ui, sans-serif" font-size="11" fill="#EF4444">pop 2 (NGE=5)</text>
  <text x="710" y="218" text-anchor="middle" font-family="monospace" font-size="12" fill="#0F172A">[ <tspan fill="#10B981" font-weight="bold">5</tspan>, <tspan fill="#10B981" font-weight="bold">5</tspan>, _, _, _ ]</text>

  <!-- Step 4: Process 3 -->
  <text x="80" y="268" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748B">i=3</text>
  <rect x="165" y="248" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="183" y="268" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">2</text>
  <rect x="207" y="248" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="225" y="268" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">1</text>
  <rect x="249" y="248" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="267" y="268" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">5</text>
  <rect x="291" y="248" width="36" height="30" rx="4" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
  <text x="309" y="268" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff">3</text>
  <rect x="333" y="248" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="351" y="268" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">4</text>
  <!-- Stack: [5, 3] -->
  <rect x="490" y="248" width="36" height="30" rx="4" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1"/>
  <text x="508" y="268" text-anchor="middle" font-family="monospace" font-size="13" fill="#475569">5</text>
  <rect x="530" y="248" width="36" height="30" rx="4" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
  <text x="548" y="268" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff">3</text>
  <text x="580" y="268" font-family="system-ui, sans-serif" font-size="11" fill="#10B981">push 3</text>
  <text x="710" y="268" text-anchor="middle" font-family="monospace" font-size="12" fill="#0F172A">[ 5, 5, _, _, _ ]</text>

  <!-- Step 5: Process 4 — pops 3! -->
  <text x="80" y="318" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748B">i=4</text>
  <rect x="165" y="298" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="183" y="318" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">2</text>
  <rect x="207" y="298" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="225" y="318" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">1</text>
  <rect x="249" y="298" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="267" y="318" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">5</text>
  <rect x="291" y="298" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="309" y="318" text-anchor="middle" font-family="monospace" font-size="13" fill="#334155">3</text>
  <rect x="333" y="298" width="36" height="30" rx="4" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
  <text x="351" y="318" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff">4</text>
  <!-- Stack: [5, 4] -->
  <rect x="490" y="298" width="36" height="30" rx="4" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1"/>
  <text x="508" y="318" text-anchor="middle" font-family="monospace" font-size="13" fill="#475569">5</text>
  <rect x="530" y="298" width="36" height="30" rx="4" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
  <text x="548" y="318" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff">4</text>
  <text x="580" y="318" font-family="system-ui, sans-serif" font-size="11" fill="#EF4444">pop 3 (NGE=4)</text>
  <text x="710" y="318" text-anchor="middle" font-family="monospace" font-size="12" fill="#0F172A">[ 5, 5, _, <tspan fill="#10B981" font-weight="bold">4</tspan>, _ ]</text>

  <!-- Final result -->
  <rect x="40" y="348" width="720" height="42" rx="10" fill="#F0FDFA" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="60" y="368" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#0F172A">Final:</text>
  <text x="110" y="368" font-family="monospace" font-size="13" fill="#06B6D4" font-weight="bold">result = [ 5, 5, -1, 4, -1 ]</text>
  <text x="400" y="368" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Remaining stack items (5, 4) have no greater element = -1</text>
  <text x="400" y="383" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">O(n) time — each element pushed and popped at most once | O(n) space</text>
</svg>
