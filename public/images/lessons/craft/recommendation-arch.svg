<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FAFAFE"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#1E1B4B">Recommendation Engine — Full ML System Architecture</text>

  <!-- ===== TOP ROW: Data Sources ===== -->
  <text x="120" y="56" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#6B7280">DATA SOURCES</text>
  <rect x="20" y="64" width="90" height="42" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="65" y="82" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#5B21B6">User Events</text>
  <text x="65" y="98" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#7C3AED">Clicks, Views, Likes</text>
  <rect x="120" y="64" width="90" height="42" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="165" y="82" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#5B21B6">Item Catalog</text>
  <text x="165" y="98" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#7C3AED">Metadata, Tags</text>
  <rect x="220" y="64" width="90" height="42" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="265" y="82" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#5B21B6">User Profiles</text>
  <text x="265" y="98" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#7C3AED">Demographics</text>

  <!-- Arrows down from sources -->
  <line x1="65" y1="106" x2="65" y2="130" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#raDown)"/>
  <line x1="165" y1="106" x2="165" y2="130" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#raDown)"/>
  <line x1="265" y1="106" x2="265" y2="130" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#raDown)"/>

  <!-- ===== Stream Processing ===== -->
  <rect x="20" y="132" width="290" height="40" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="165" y="150" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#B45309">Stream Processing (Kafka / Kinesis)</text>
  <text x="165" y="164" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#D97706">Real-time event ingestion + enrichment</text>

  <!-- Arrows: stream splits into batch + real-time paths -->
  <line x1="165" y1="172" x2="165" y2="198" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#raYellow)"/>

  <!-- ===== BATCH PATH (Left) ===== -->
  <text x="100" y="198" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700" fill="#3B82F6">BATCH PATH (Offline)</text>

  <!-- Data Lake -->
  <rect x="20" y="206" width="130" height="40" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="85" y="224" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#1D4ED8">Data Lake (S3)</text>
  <text x="85" y="238" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#2563EB">Historical interactions</text>
  <line x1="130" y1="172" x2="85" y2="204" stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#raBlue)"/>

  <!-- Feature Engineering -->
  <rect x="20" y="260" width="130" height="42" rx="8" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/>
  <text x="85" y="278" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#0F766E">Feature Engineering</text>
  <text x="85" y="293" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#0D9488">Spark / Flink batch jobs</text>
  <line x1="85" y1="246" x2="85" y2="258" stroke="#3B82F6" stroke-width="1.2" marker-end="url(#raBlue)"/>

  <!-- Model Training -->
  <rect x="20" y="316" width="130" height="50" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="2"/>
  <text x="85" y="335" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#BE185D">Model Training</text>
  <text x="85" y="350" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#DB2777">TensorFlow / PyTorch</text>
  <text x="85" y="361" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#DB2777">GPU cluster (daily)</text>
  <line x1="85" y1="302" x2="85" y2="314" stroke="#14B8A6" stroke-width="1.2" marker-end="url(#raTeal)"/>

  <!-- Model Registry -->
  <rect x="20" y="380" width="130" height="38" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
  <text x="85" y="398" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#BE185D">Model Registry</text>
  <text x="85" y="411" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#DB2777">MLflow / SageMaker</text>
  <line x1="85" y1="366" x2="85" y2="378" stroke="#EC4899" stroke-width="1.2" marker-end="url(#raPink)"/>

  <!-- ===== FEATURE STORE (Center) ===== -->
  <rect x="170" y="206" width="160" height="76" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="250" y="228" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#C2410C">Feature Store</text>
  <text x="250" y="245" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#EA580C">Online: Redis (low latency)</text>
  <text x="250" y="259" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#EA580C">Offline: Hive / BigQuery</text>
  <text x="250" y="273" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#FB923C">User embeds, item embeds, context</text>

  <!-- Arrows to feature store -->
  <line x1="150" y1="280" x2="185" y2="270" stroke="#14B8A6" stroke-width="1.2" marker-end="url(#raTeal)"/>

  <!-- ===== REAL-TIME PATH (Right) ===== -->
  <text x="580" y="56" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#10B981">REAL-TIME PATH (Online)</text>

  <!-- API Gateway -->
  <rect x="520" y="66" width="120" height="38" rx="8" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/>
  <text x="580" y="83" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#0F766E">API Gateway</text>
  <text x="580" y="98" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#0D9488">Auth + Rate Limit</text>

  <!-- Client -->
  <rect x="680" y="66" width="100" height="38" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="730" y="84" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#5B21B6">Client App</text>
  <text x="730" y="98" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#7C3AED">Mobile / Web</text>
  <line x1="640" y1="85" x2="678" y2="85" stroke="#14B8A6" stroke-width="1.5" marker-end="url(#raTeal)"/>

  <!-- Retrieval: Candidate Generation -->
  <rect x="430" y="120" width="150" height="50" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="505" y="140" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#5B21B6">Candidate Generation</text>
  <text x="505" y="155" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#7C3AED">ANN search (FAISS/Milvus)</text>
  <text x="505" y="165" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#7C3AED">Millions -&gt; 1000 candidates</text>
  <line x1="580" y1="104" x2="530" y2="118" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#raPurple)"/>

  <!-- Arrow Feature Store → Candidate Gen -->
  <line x1="330" y1="240" x2="440" y2="155" stroke="#F97316" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#raOrange)"/>
  <text x="380" y="190" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#F97316">embeddings</text>

  <!-- Ranking -->
  <rect x="430" y="190" width="150" height="50" rx="10" fill="#FDF2F8" stroke="#EC4899" stroke-width="2"/>
  <text x="505" y="210" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#BE185D">ML Ranking Model</text>
  <text x="505" y="225" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#DB2777">Deep neural network</text>
  <text x="505" y="235" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#DB2777">1000 -&gt; Top 50 scored</text>
  <line x1="505" y1="170" x2="505" y2="188" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#raPurple)"/>

  <!-- Feature Store → Ranker -->
  <line x1="330" y1="250" x2="440" y2="215" stroke="#F97316" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#raOrange)"/>
  <text x="375" y="240" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#F97316">features</text>

  <!-- Re-ranking / Business Logic -->
  <rect x="430" y="260" width="150" height="46" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="505" y="278" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#047857">Re-Ranking Layer</text>
  <text x="505" y="294" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#059669">Diversity, freshness, business rules</text>
  <line x1="505" y1="240" x2="505" y2="258" stroke="#EC4899" stroke-width="1.2" marker-end="url(#raPink)"/>

  <!-- Response Cache -->
  <rect x="630" y="260" width="100" height="40" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="680" y="278" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#C2410C">Response Cache</text>
  <text x="680" y="293" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#EA580C">Redis, TTL: 5min</text>
  <line x1="580" y1="280" x2="628" y2="280" stroke="#F97316" stroke-width="1.2" marker-end="url(#raOrange)"/>

  <!-- Model Serving → API -->
  <line x1="580" y1="104" x2="580" y2="118" stroke="#8B5CF6" stroke-width="0.8"/>

  <!-- Model Registry → Serving (deploy arrow) -->
  <path d="M150,399 Q300,430 430,235" fill="none" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#raPink)"/>
  <text x="300" y="370" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#EC4899">deploy model</text>

  <!-- ===== A/B Testing ===== -->
  <rect x="430" y="320" width="300" height="48" rx="10" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="580" y="340" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#0369A1">A/B Testing Framework</text>
  <text x="580" y="356" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#0284C7">Traffic split: Model v1 (90%) vs v2 (10%) | Metrics: CTR, engagement, revenue</text>
  <line x1="505" y1="306" x2="505" y2="318" stroke="#0EA5E9" stroke-width="1.2" marker-end="url(#raSky)"/>

  <!-- ===== Monitoring ===== -->
  <rect x="170" y="380" width="560" height="38" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="450" y="398" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#374151">Monitoring: Model Drift Detection | Latency p99 &lt; 100ms | Feature freshness alerts</text>
  <text x="450" y="412" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#9CA3AF">Grafana dashboards | PagerDuty alerts | Data quality checks (Great Expectations)</text>

  <!-- Scale numbers -->
  <rect x="170" y="435" width="560" height="50" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="450" y="454" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5B21B6">Scale Reference (Netflix-level)</text>
  <text x="450" y="472" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#7C3AED">230M users | 15K titles | 100M+ events/day | Model retrain: daily | Serving: 50K RPS | p99 latency: 80ms</text>

  <defs>
    <marker id="raDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto"><path d="M0,0 L4,6 L8,0 Z" fill="#8B5CF6"/></marker>
    <marker id="raPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8B5CF6"/></marker>
    <marker id="raTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#14B8A6"/></marker>
    <marker id="raOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F97316"/></marker>
    <marker id="raBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3B82F6"/></marker>
    <marker id="raPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#EC4899"/></marker>
    <marker id="raYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F59E0B"/></marker>
    <marker id="raSky" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0EA5E9"/></marker>
  </defs>
</svg>
