<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#0F172A">Sliding Window — Maximum Sum of Subarray (k=3)</text>

  <!-- Step 1 -->
  <text x="40" y="75" font-family="system-ui, sans-serif" font-size="13" fill="#64748B" font-weight="600">Window 1:</text>
  <g transform="translate(130, 58)">
    <!-- Window highlight -->
    <rect x="-4" y="-4" width="198" height="48" rx="8" fill="none" stroke="#06B6D4" stroke-width="3"/>
    <rect x="0" y="0" width="60" height="40" rx="5" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
    <text x="30" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">2</text>
    <rect x="66" y="0" width="60" height="40" rx="5" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
    <text x="96" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">1</text>
    <rect x="132" y="0" width="60" height="40" rx="5" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
    <text x="162" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">5</text>
    <rect x="198" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="228" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">1</text>
    <rect x="264" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="294" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">3</text>
    <rect x="330" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="360" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">8</text>
    <rect x="396" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="426" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">2</text>
  </g>
  <text x="620" y="82" font-family="monospace" font-size="14" fill="#06B6D4" font-weight="bold">sum = 8</text>
  <text x="700" y="82" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">max = 8</text>

  <!-- Step 2 -->
  <text x="40" y="145" font-family="system-ui, sans-serif" font-size="13" fill="#64748B" font-weight="600">Window 2:</text>
  <g transform="translate(130, 128)">
    <rect x="62" y="-4" width="198" height="48" rx="8" fill="none" stroke="#06B6D4" stroke-width="3"/>
    <rect x="0" y="0" width="60" height="40" rx="5" fill="#FEE2E2" stroke="#FECACA" stroke-width="1.5"/>
    <text x="30" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#EF4444">2</text>
    <!-- subtract arrow -->
    <text x="30" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#EF4444" font-weight="bold">-2</text>
    <rect x="66" y="0" width="60" height="40" rx="5" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
    <text x="96" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">1</text>
    <rect x="132" y="0" width="60" height="40" rx="5" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
    <text x="162" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">5</text>
    <rect x="198" y="0" width="60" height="40" rx="5" fill="#10B981" stroke="#059669" stroke-width="1.5"/>
    <text x="228" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">1</text>
    <!-- add arrow -->
    <text x="228" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#10B981" font-weight="bold">+1</text>
    <rect x="264" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="294" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">3</text>
    <rect x="330" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="360" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">8</text>
    <rect x="396" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="426" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">2</text>
  </g>
  <text x="620" y="152" font-family="monospace" font-size="14" fill="#06B6D4" font-weight="bold">sum = 7</text>
  <text x="700" y="152" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">max = 8</text>

  <!-- Step 3 -->
  <text x="40" y="215" font-family="system-ui, sans-serif" font-size="13" fill="#64748B" font-weight="600">Window 3:</text>
  <g transform="translate(130, 198)">
    <rect x="128" y="-4" width="198" height="48" rx="8" fill="none" stroke="#06B6D4" stroke-width="3"/>
    <rect x="0" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4"/>
    <text x="30" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#94A3B8">2</text>
    <rect x="66" y="0" width="60" height="40" rx="5" fill="#FEE2E2" stroke="#FECACA" stroke-width="1.5"/>
    <text x="96" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#EF4444">1</text>
    <text x="96" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#EF4444" font-weight="bold">-1</text>
    <rect x="132" y="0" width="60" height="40" rx="5" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
    <text x="162" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">5</text>
    <rect x="198" y="0" width="60" height="40" rx="5" fill="#06B6D4" stroke="#0891B2" stroke-width="1.5"/>
    <text x="228" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">1</text>
    <rect x="264" y="0" width="60" height="40" rx="5" fill="#10B981" stroke="#059669" stroke-width="1.5"/>
    <text x="294" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">3</text>
    <text x="294" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#10B981" font-weight="bold">+3</text>
    <rect x="330" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="360" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">8</text>
    <rect x="396" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="426" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">2</text>
  </g>
  <text x="620" y="222" font-family="monospace" font-size="14" fill="#06B6D4" font-weight="bold">sum = 9</text>
  <text x="700" y="222" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">max = 9</text>

  <!-- Step 4 — peak -->
  <text x="40" y="285" font-family="system-ui, sans-serif" font-size="13" fill="#64748B" font-weight="600">Window 5:</text>
  <g transform="translate(130, 268)">
    <rect x="260" y="-4" width="198" height="48" rx="8" fill="none" stroke="#F59E0B" stroke-width="3"/>
    <rect x="0" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4"/>
    <text x="30" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#94A3B8">2</text>
    <rect x="66" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4"/>
    <text x="96" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#94A3B8">1</text>
    <rect x="132" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4"/>
    <text x="162" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#94A3B8">5</text>
    <rect x="198" y="0" width="60" height="40" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4"/>
    <text x="228" y="27" text-anchor="middle" font-family="monospace" font-size="15" fill="#94A3B8">1</text>
    <rect x="264" y="0" width="60" height="40" rx="5" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/>
    <text x="294" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">3</text>
    <rect x="330" y="0" width="60" height="40" rx="5" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/>
    <text x="360" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">8</text>
    <rect x="396" y="0" width="60" height="40" rx="5" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/>
    <text x="426" y="27" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">2</text>
  </g>
  <text x="620" y="292" font-family="monospace" font-size="14" fill="#F59E0B" font-weight="bold">sum = 13</text>
  <text x="700" y="292" font-family="system-ui, sans-serif" font-size="13" fill="#F59E0B" font-weight="bold">max = 13</text>

  <!-- Key insight box -->
  <rect x="40" y="330" width="720" height="50" rx="10" fill="#F0FDFA" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="60" y="352" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0F172A">Key Insight:</text>
  <text x="160" y="352" font-family="system-ui, sans-serif" font-size="13" fill="#334155">Slide the window by subtracting the element leaving and adding the element entering.</text>
  <text x="60" y="370" font-family="monospace" font-size="12" fill="#06B6D4">newSum = oldSum - arr[i-1] + arr[i+k-1]</text>
  <text x="500" y="370" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">O(n) time | O(1) space</text>
</svg>
