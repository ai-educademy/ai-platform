<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1E293B">The STAR Framework</text>
  <text x="400" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Structure every behavioral answer in four clear steps</text>

  <!-- Connecting arrows -->
  <line x1="195" y1="200" x2="215" y2="200" stroke="#EC4899" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="213,195 223,200 213,205" fill="#EC4899"/>
  <line x1="385" y1="200" x2="405" y2="200" stroke="#EC4899" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="403,195 413,200 403,205" fill="#EC4899"/>
  <line x1="575" y1="200" x2="595" y2="200" stroke="#EC4899" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="593,195 603,200 593,205" fill="#EC4899"/>

  <!-- Step 1: Situation -->
  <rect x="20" y="80" width="175" height="240" rx="12" fill="#FDF2F8" stroke="#EC4899" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="80" width="175" height="48" rx="12" fill="#EC4899"/>
  <rect x="20" y="104" width="175" height="24" fill="#EC4899"/>
  <text x="50" y="110" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="1">STEP 1</text>
  <text x="107" y="110" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Situation</text>
  <text x="35" y="150" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" font-weight="600">Set the scene</text>
  <circle cx="35" cy="172" r="3" fill="#EC4899"/>
  <text x="44" y="176" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Project context</text>
  <circle cx="35" cy="195" r="3" fill="#EC4899"/>
  <text x="44" y="199" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Team &amp; role</text>
  <circle cx="35" cy="218" r="3" fill="#EC4899"/>
  <text x="44" y="222" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Timeline</text>
  <circle cx="35" cy="241" r="3" fill="#EC4899"/>
  <text x="44" y="245" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Stakes involved</text>
  <rect x="32" y="265" width="150" height="40" rx="6" fill="#FFFFFF" stroke="#F9A8D4" stroke-width="1"/>
  <text x="107" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#BE185D" font-style="italic">"On my team of 8,</text>
  <text x="107" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#BE185D" font-style="italic">we faced a deadline..."</text>

  <!-- Step 2: Task -->
  <rect x="225" y="80" width="175" height="240" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="225" y="80" width="175" height="48" rx="12" fill="#3B82F6"/>
  <rect x="225" y="104" width="175" height="24" fill="#3B82F6"/>
  <text x="255" y="110" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="1">STEP 2</text>
  <text x="318" y="110" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Task</text>
  <text x="240" y="150" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" font-weight="600">Define the challenge</text>
  <circle cx="240" cy="172" r="3" fill="#3B82F6"/>
  <text x="249" y="176" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Your responsibility</text>
  <circle cx="240" cy="195" r="3" fill="#3B82F6"/>
  <text x="249" y="199" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Goal or objective</text>
  <circle cx="240" cy="218" r="3" fill="#3B82F6"/>
  <text x="249" y="222" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Constraints</text>
  <circle cx="240" cy="241" r="3" fill="#3B82F6"/>
  <text x="249" y="245" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Why it mattered</text>
  <rect x="237" y="265" width="150" height="40" rx="6" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1"/>
  <text x="312" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1D4ED8" font-style="italic">"I was responsible for</text>
  <text x="312" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1D4ED8" font-style="italic">reducing latency by 50%"</text>

  <!-- Step 3: Action -->
  <rect x="415" y="80" width="175" height="240" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="415" y="80" width="175" height="48" rx="12" fill="#22C55E"/>
  <rect x="415" y="104" width="175" height="24" fill="#22C55E"/>
  <text x="445" y="110" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="1">STEP 3</text>
  <text x="505" y="110" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Action</text>
  <text x="430" y="150" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" font-weight="600">What YOU did</text>
  <circle cx="430" cy="172" r="3" fill="#22C55E"/>
  <text x="439" y="176" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Specific steps taken</text>
  <circle cx="430" cy="195" r="3" fill="#22C55E"/>
  <text x="439" y="199" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Tools &amp; technologies</text>
  <circle cx="430" cy="218" r="3" fill="#22C55E"/>
  <text x="439" y="222" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Decisions &amp; reasoning</text>
  <circle cx="430" cy="241" r="3" fill="#22C55E"/>
  <text x="439" y="245" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Collaboration</text>
  <rect x="427" y="265" width="150" height="40" rx="6" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
  <text x="502" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#166534" font-style="italic">"I profiled the service,</text>
  <text x="502" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#166534" font-style="italic">implemented caching..."</text>

  <!-- Step 4: Result -->
  <rect x="605" y="80" width="175" height="240" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <rect x="605" y="80" width="175" height="48" rx="12" fill="#F59E0B"/>
  <rect x="605" y="104" width="175" height="24" fill="#F59E0B"/>
  <text x="635" y="110" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="1">STEP 4</text>
  <text x="697" y="110" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Result</text>
  <text x="620" y="150" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" font-weight="600">Show the impact</text>
  <circle cx="620" cy="172" r="3" fill="#F59E0B"/>
  <text x="629" y="176" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Quantified outcomes</text>
  <circle cx="620" cy="195" r="3" fill="#F59E0B"/>
  <text x="629" y="199" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Business impact</text>
  <circle cx="620" cy="218" r="3" fill="#F59E0B"/>
  <text x="629" y="222" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Lessons learned</text>
  <circle cx="620" cy="241" r="3" fill="#F59E0B"/>
  <text x="629" y="245" font-family="system-ui, sans-serif" font-size="11" fill="#334155">What you'd change</text>
  <rect x="617" y="265" width="150" height="40" rx="6" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1"/>
  <text x="692" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400E" font-style="italic">"Latency dropped 60%,</text>
  <text x="692" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400E" font-style="italic">saving $200K annually"</text>

  <!-- Bottom tip bar -->
  <rect x="20" y="340" width="760" height="45" rx="8" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1"/>
  <text x="40" y="362" font-family="system-ui, sans-serif" font-size="11" fill="#BE185D" font-weight="600">Pro Tip:</text>
  <text x="95" y="362" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Spend 70% of your time on Action &amp; Result. The Situation and Task are just context — keep them brief (2-3 sentences each).</text>
</svg>
