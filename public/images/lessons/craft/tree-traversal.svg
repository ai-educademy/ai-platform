<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#0F172A">Binary Tree Traversal — BFS vs DFS</text>

  <!-- BFS Side -->
  <text x="200" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#06B6D4">BFS (Level Order)</text>
  <text x="200" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Uses a Queue — visit level by level</text>

  <!-- BFS Tree edges -->
  <line x1="200" y1="110" x2="130" y2="165" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="200" y1="110" x2="270" y2="165" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="130" y1="190" x2="90" y2="245" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="130" y1="190" x2="170" y2="245" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="270" y1="190" x2="230" y2="245" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="270" y1="190" x2="310" y2="245" stroke="#CBD5E1" stroke-width="2"/>

  <!-- BFS nodes with visit order -->
  <!-- Level 0 -->
  <circle cx="200" cy="100" r="22" fill="#06B6D4" stroke="#0891B2" stroke-width="2"/>
  <text x="200" y="105" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">A</text>
  <circle cx="222" cy="84" r="10" fill="#F59E0B"/>
  <text x="222" y="88" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">1</text>

  <!-- Level 1 -->
  <circle cx="130" cy="178" r="22" fill="#06B6D4" stroke="#0891B2" stroke-width="2"/>
  <text x="130" y="183" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">B</text>
  <circle cx="152" cy="162" r="10" fill="#F59E0B"/>
  <text x="152" y="166" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">2</text>

  <circle cx="270" cy="178" r="22" fill="#06B6D4" stroke="#0891B2" stroke-width="2"/>
  <text x="270" y="183" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">C</text>
  <circle cx="292" cy="162" r="10" fill="#F59E0B"/>
  <text x="292" y="166" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">3</text>

  <!-- Level 2 -->
  <circle cx="90" cy="256" r="22" fill="#06B6D4" stroke="#0891B2" stroke-width="2"/>
  <text x="90" y="261" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">D</text>
  <circle cx="112" cy="240" r="10" fill="#F59E0B"/>
  <text x="112" y="244" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">4</text>

  <circle cx="170" cy="256" r="22" fill="#06B6D4" stroke="#0891B2" stroke-width="2"/>
  <text x="170" y="261" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">E</text>
  <circle cx="192" cy="240" r="10" fill="#F59E0B"/>
  <text x="192" y="244" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">5</text>

  <circle cx="230" cy="256" r="22" fill="#06B6D4" stroke="#0891B2" stroke-width="2"/>
  <text x="230" y="261" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">F</text>
  <circle cx="252" cy="240" r="10" fill="#F59E0B"/>
  <text x="252" y="244" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">6</text>

  <circle cx="310" cy="256" r="22" fill="#06B6D4" stroke="#0891B2" stroke-width="2"/>
  <text x="310" y="261" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">G</text>
  <circle cx="332" cy="240" r="10" fill="#F59E0B"/>
  <text x="332" y="244" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">7</text>

  <!-- BFS order -->
  <rect x="60" y="298" width="280" height="30" rx="6" fill="#F0FDFA" stroke="#06B6D4" stroke-width="1"/>
  <text x="200" y="318" text-anchor="middle" font-family="monospace" font-size="13" fill="#06B6D4" font-weight="bold">A - B - C - D - E - F - G</text>

  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="380" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6"/>

  <!-- DFS Side -->
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">DFS (Pre-order)</text>
  <text x="600" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Uses a Stack — go deep first</text>

  <!-- DFS Tree edges -->
  <line x1="600" y1="110" x2="530" y2="165" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="600" y1="110" x2="670" y2="165" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="530" y1="190" x2="490" y2="245" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="530" y1="190" x2="570" y2="245" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="670" y1="190" x2="630" y2="245" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="670" y1="190" x2="710" y2="245" stroke="#CBD5E1" stroke-width="2"/>

  <!-- DFS nodes with visit order -->
  <circle cx="600" cy="100" r="22" fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
  <text x="600" y="105" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">A</text>
  <circle cx="622" cy="84" r="10" fill="#F59E0B"/>
  <text x="622" y="88" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">1</text>

  <circle cx="530" cy="178" r="22" fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
  <text x="530" y="183" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">B</text>
  <circle cx="552" cy="162" r="10" fill="#F59E0B"/>
  <text x="552" y="166" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">2</text>

  <circle cx="670" cy="178" r="22" fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
  <text x="670" y="183" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">C</text>
  <circle cx="692" cy="162" r="10" fill="#F59E0B"/>
  <text x="692" y="166" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">5</text>

  <circle cx="490" cy="256" r="22" fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
  <text x="490" y="261" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">D</text>
  <circle cx="512" cy="240" r="10" fill="#F59E0B"/>
  <text x="512" y="244" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">3</text>

  <circle cx="570" cy="256" r="22" fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
  <text x="570" y="261" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">E</text>
  <circle cx="592" cy="240" r="10" fill="#F59E0B"/>
  <text x="592" y="244" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">4</text>

  <circle cx="630" cy="256" r="22" fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
  <text x="630" y="261" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">F</text>
  <circle cx="652" cy="240" r="10" fill="#F59E0B"/>
  <text x="652" y="244" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">6</text>

  <circle cx="710" cy="256" r="22" fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
  <text x="710" y="261" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">G</text>
  <circle cx="732" cy="240" r="10" fill="#F59E0B"/>
  <text x="732" y="244" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">7</text>

  <!-- DFS order -->
  <rect x="460" y="298" width="280" height="30" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="600" y="318" text-anchor="middle" font-family="monospace" font-size="13" fill="#7C3AED" font-weight="bold">A - B - D - E - C - F - G</text>

  <!-- Bottom comparison -->
  <rect x="40" y="345" width="720" height="45" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="200" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#06B6D4" font-weight="bold">BFS: Queue | O(w) space</text>
  <text x="200" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Best for: shortest path, level order</text>
  <text x="600" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#7C3AED" font-weight="bold">DFS: Stack/Recursion | O(h) space</text>
  <text x="600" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Best for: path finding, tree depth</text>
</svg>
