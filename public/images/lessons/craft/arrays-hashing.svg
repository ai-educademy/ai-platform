<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Arrays &amp; Hash Maps — Memory Layout</text>

  <!-- ARRAY SECTION (Left) -->
  <text x="190" y="65" text-anchor="middle" font-size="15" font-weight="600" fill="#F97316">Array — Contiguous Memory</text>

  <!-- Memory address bar -->
  <text x="32" y="95" font-size="10" fill="#94A3B8">addr</text>
  <text x="32" y="110" font-size="10" fill="#94A3B8">0x00</text>
  <text x="92" y="110" font-size="10" fill="#94A3B8">0x04</text>
  <text x="152" y="110" font-size="10" fill="#94A3B8">0x08</text>
  <text x="212" y="110" font-size="10" fill="#94A3B8">0x0C</text>
  <text x="272" y="110" font-size="10" fill="#94A3B8">0x10</text>
  <text x="332" y="110" font-size="10" fill="#94A3B8">0x14</text>

  <!-- Array cells -->
  <rect x="30" y="118" width="60" height="40" rx="4" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="60" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">5</text>
  <rect x="90" y="118" width="60" height="40" rx="4" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="120" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">12</text>
  <rect x="150" y="118" width="60" height="40" rx="4" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="180" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">3</text>
  <rect x="210" y="118" width="60" height="40" rx="4" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="240" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">8</text>
  <rect x="270" y="118" width="60" height="40" rx="4" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="300" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">1</text>
  <rect x="330" y="118" width="60" height="40" rx="4" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="360" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">9</text>

  <!-- Index labels -->
  <text x="60" y="175" text-anchor="middle" font-size="11" fill="#64748B">[0]</text>
  <text x="120" y="175" text-anchor="middle" font-size="11" fill="#64748B">[1]</text>
  <text x="180" y="175" text-anchor="middle" font-size="11" fill="#64748B">[2]</text>
  <text x="240" y="175" text-anchor="middle" font-size="11" fill="#64748B">[3]</text>
  <text x="300" y="175" text-anchor="middle" font-size="11" fill="#64748B">[4]</text>
  <text x="360" y="175" text-anchor="middle" font-size="11" fill="#64748B">[5]</text>

  <!-- O(1) access arrow -->
  <line x1="240" y1="190" x2="240" y2="118" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="240" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">O(1) access by index</text>

  <!-- Array properties box -->
  <rect x="30" y="220" width="360" height="80" rx="6" fill="#F0FDF4" stroke="#10B981" stroke-width="1"/>
  <text x="45" y="242" font-size="12" fill="#1E293B" font-weight="600">Key Properties:</text>
  <circle cx="50" cy="257" r="3" fill="#F97316"/>
  <text x="60" y="261" font-size="11" fill="#475569">Fixed size, contiguous memory</text>
  <circle cx="50" cy="275" r="3" fill="#F97316"/>
  <text x="60" y="279" font-size="11" fill="#475569">O(1) read/write by index</text>
  <circle cx="210" cy="257" r="3" fill="#F97316"/>
  <text x="220" y="261" font-size="11" fill="#475569">O(n) insert/delete</text>
  <circle cx="210" cy="275" r="3" fill="#F97316"/>
  <text x="220" y="279" font-size="11" fill="#475569">Cache-friendly layout</text>

  <!-- Divider -->
  <line x1="405" y1="50" x2="405" y2="390" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- HASH MAP SECTION (Right) -->
  <text x="600" y="65" text-anchor="middle" font-size="15" font-weight="600" fill="#F97316">Hash Map — Key to Bucket</text>

  <!-- Keys -->
  <rect x="425" y="85" width="80" height="30" rx="14" fill="#F97316" stroke="none"/>
  <text x="465" y="105" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="600">"apple"</text>
  <rect x="425" y="125" width="80" height="30" rx="14" fill="#F97316" stroke="none"/>
  <text x="465" y="145" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="600">"banana"</text>
  <rect x="425" y="165" width="80" height="30" rx="14" fill="#F97316" stroke="none"/>
  <text x="465" y="185" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="600">"cherry"</text>
  <rect x="425" y="205" width="80" height="30" rx="14" fill="#F97316" stroke="none"/>
  <text x="465" y="225" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="600">"date"</text>

  <!-- Hash function box -->
  <rect x="535" y="120" width="70" height="90" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="570" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#8B5CF6">hash()</text>
  <text x="570" y="168" text-anchor="middle" font-size="11" fill="#8B5CF6">key %</text>
  <text x="570" y="186" text-anchor="middle" font-size="11" fill="#8B5CF6">size</text>

  <!-- Arrows: keys to hash -->
  <line x1="505" y1="100" x2="535" y2="140" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="505" y1="140" x2="535" y2="155" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="505" y1="180" x2="535" y2="170" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="505" y1="220" x2="535" y2="195" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Buckets -->
  <rect x="640" y="80" width="140" height="30" rx="4" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="648" y="99" font-size="10" fill="#94A3B8">[0]</text>
  <text x="680" y="99" font-size="12" fill="#1E293B">apple: 3</text>

  <rect x="640" y="115" width="140" height="30" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="648" y="134" font-size="10" fill="#94A3B8">[1]</text>
  <text x="680" y="134" font-size="12" fill="#CBD5E1">empty</text>

  <rect x="640" y="150" width="140" height="30" rx="4" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="648" y="169" font-size="10" fill="#94A3B8">[2]</text>
  <text x="680" y="169" font-size="12" fill="#1E293B">banana: 5</text>

  <rect x="640" y="185" width="140" height="30" rx="4" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="648" y="204" font-size="10" fill="#94A3B8">[3]</text>
  <text x="680" y="204" font-size="12" fill="#1E293B">cherry: 2</text>

  <rect x="640" y="220" width="140" height="30" rx="4" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="648" y="239" font-size="10" fill="#94A3B8">[4]</text>
  <text x="680" y="239" font-size="12" fill="#1E293B">date: 7</text>

  <!-- Arrows: hash to buckets -->
  <line x1="605" y1="140" x2="640" y2="95" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="605" y1="155" x2="640" y2="165" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="605" y1="170" x2="640" y2="200" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="605" y1="195" x2="640" y2="235" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Bucket label -->
  <text x="710" y="72" text-anchor="middle" font-size="11" fill="#64748B" font-weight="600">Buckets</text>

  <!-- Hash map properties box -->
  <rect x="425" y="265" width="355" height="80" rx="6" fill="#F0FDF4" stroke="#10B981" stroke-width="1"/>
  <text x="440" y="287" font-size="12" fill="#1E293B" font-weight="600">Key Properties:</text>
  <circle cx="445" cy="302" r="3" fill="#F97316"/>
  <text x="455" y="306" font-size="11" fill="#475569">O(1) average lookup, insert, delete</text>
  <circle cx="445" cy="320" r="3" fill="#F97316"/>
  <text x="455" y="324" font-size="11" fill="#475569">Keys must be hashable</text>
  <circle cx="635" cy="302" r="3" fill="#F97316"/>
  <text x="645" y="306" font-size="11" fill="#475569">O(n) worst case (collisions)</text>
  <circle cx="635" cy="320" r="3" fill="#F97316"/>
  <text x="645" y="324" font-size="11" fill="#475569">Unordered key-value pairs</text>

  <!-- AI Connection Banner -->
  <rect x="30" y="360" width="740" height="32" rx="6" fill="#1E293B"/>
  <text x="50" y="381" font-size="12" fill="#F97316" font-weight="700">AI CONNECTION</text>
  <text x="175" y="381" font-size="12" fill="#E2E8F0">Hash maps power ML feature stores — O(1) lookup for real-time model inference</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#CBD5E1"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B5CF6"/>
    </marker>
  </defs>
</svg>
