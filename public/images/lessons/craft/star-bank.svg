<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1E293B">Build Your Story Bank</text>
  <text x="400" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Prepare 6-8 stories that cover all major behavioral categories</text>

  <!-- Central hub -->
  <circle cx="400" cy="210" r="55" fill="#EC4899" filter="url(#shadow)"/>
  <circle cx="400" cy="210" r="50" fill="#EC4899"/>
  <text x="400" y="203" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">YOUR</text>
  <text x="400" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">STORIES</text>

  <!-- Connecting lines -->
  <line x1="350" y1="180" x2="200" y2="120" stroke="#F9A8D4" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="450" y1="180" x2="600" y2="120" stroke="#F9A8D4" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="345" y1="220" x2="140" y2="260" stroke="#F9A8D4" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="455" y1="220" x2="660" y2="260" stroke="#F9A8D4" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="400" y1="265" x2="400" y2="310" stroke="#F9A8D4" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Category 1: Leadership (top-left) -->
  <rect x="60" y="72" width="180" height="90" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="72" width="180" height="28" rx="10" fill="#3B82F6"/>
  <rect x="60" y="86" width="180" height="14" fill="#3B82F6"/>
  <text x="150" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Leadership</text>
  <text x="75" y="118" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Led a cross-team initiative</text>
  <text x="75" y="132" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Mentored junior engineers</text>
  <text x="75" y="146" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Drove technical decisions</text>

  <!-- Category 2: Technical Challenge (top-right) -->
  <rect x="560" y="72" width="180" height="90" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="560" y="72" width="180" height="28" rx="10" fill="#22C55E"/>
  <rect x="560" y="86" width="180" height="14" fill="#22C55E"/>
  <text x="650" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Technical Challenge</text>
  <text x="575" y="118" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Debugged production outage</text>
  <text x="575" y="132" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Scaled system 10x</text>
  <text x="575" y="146" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Migrated legacy architecture</text>

  <!-- Category 3: Conflict Resolution (left) -->
  <rect x="20" y="220" width="180" height="90" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="220" width="180" height="28" rx="10" fill="#F59E0B"/>
  <rect x="20" y="234" width="180" height="14" fill="#F59E0B"/>
  <text x="110" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Conflict Resolution</text>
  <text x="35" y="266" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Disagreed with manager</text>
  <text x="35" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Team alignment challenge</text>
  <text x="35" y="294" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Stakeholder pushback</text>

  <!-- Category 4: Innovation (right) -->
  <rect x="600" y="220" width="180" height="90" rx="10" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="600" y="220" width="180" height="28" rx="10" fill="#8B5CF6"/>
  <rect x="600" y="234" width="180" height="14" fill="#8B5CF6"/>
  <text x="690" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Innovation</text>
  <text x="615" y="266" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Proposed new approach</text>
  <text x="615" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Built AI/ML solution</text>
  <text x="615" y="294" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Improved team workflow</text>

  <!-- Category 5: Failure & Growth (bottom-center) -->
  <rect x="310" y="315" width="180" height="75" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="310" y="315" width="180" height="28" rx="10" fill="#EF4444"/>
  <rect x="310" y="329" width="180" height="14" fill="#EF4444"/>
  <text x="400" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Failure &amp; Growth</text>
  <text x="325" y="361" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Project that didn't ship</text>
  <text x="325" y="375" font-family="system-ui, sans-serif" font-size="10" fill="#475569">- Mistake and recovery</text>

  <!-- Badge: number indicator -->
  <circle cx="240" cy="72" r="12" fill="#3B82F6"/>
  <text x="240" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">2</text>
  <circle cx="740" cy="72" r="12" fill="#22C55E"/>
  <text x="740" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">2</text>
  <circle cx="200" cy="220" r="12" fill="#F59E0B"/>
  <text x="200" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">1</text>
  <circle cx="780" cy="220" r="12" fill="#8B5CF6"/>
  <text x="780" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">2</text>
  <circle cx="490" cy="315" r="12" fill="#EF4444"/>
  <text x="490" y="319" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">1</text>

  <!-- Legend -->
  <text x="740" y="390" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">Numbers = recommended stories per category</text>
</svg>
