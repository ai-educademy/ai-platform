<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1E293B">AI Build vs Buy — Decision Framework</text>
  <text x="400" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Navigate the decision tree for AI/ML solutions</text>

  <!-- Root node -->
  <rect x="300" y="58" width="200" height="36" rx="18" fill="#EC4899" filter="url(#shadow)"/>
  <text x="400" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Is AI core to your product?</text>

  <!-- Lines from root -->
  <line x1="350" y1="94" x2="180" y2="125" stroke="#22C55E" stroke-width="2"/>
  <line x1="450" y1="94" x2="620" y2="125" stroke="#EF4444" stroke-width="2"/>
  <text x="250" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#22C55E">YES</text>
  <text x="548" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#EF4444">NO</text>

  <!-- Level 2 Left: Core competency YES -->
  <rect x="80" y="125" width="200" height="36" rx="18" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="180" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Is data sensitive/proprietary?</text>

  <!-- Level 2 Right: Core competency NO -->
  <rect x="520" y="125" width="200" height="36" rx="18" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="620" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Need customisation?</text>

  <!-- Lines from Level 2 Left -->
  <line x1="130" y1="161" x2="80" y2="195" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="230" y1="161" x2="280" y2="195" stroke="#EF4444" stroke-width="1.5"/>
  <text x="95" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#22C55E">YES</text>
  <text x="265" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#EF4444">NO</text>

  <!-- Lines from Level 2 Right -->
  <line x1="570" y1="161" x2="520" y2="195" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="670" y1="161" x2="720" y2="195" stroke="#EF4444" stroke-width="1.5"/>
  <text x="535" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#22C55E">YES</text>
  <text x="703" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#EF4444">NO</text>

  <!-- Level 3 nodes -->
  <!-- Left-Left: Data sensitive YES -->
  <rect x="15" y="195" width="140" height="36" rx="18" fill="#8B5CF6" filter="url(#shadow)"/>
  <text x="85" y="217" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Team has ML skills?</text>

  <!-- Left-Right: Data sensitive NO -->
  <rect x="210" y="195" width="140" height="36" rx="18" fill="#8B5CF6" filter="url(#shadow)"/>
  <text x="280" y="217" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Budget for build?</text>

  <!-- Right-Left: Need customisation YES -->
  <rect x="450" y="195" width="140" height="36" rx="18" fill="#8B5CF6" filter="url(#shadow)"/>
  <text x="520" y="217" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Time pressure?</text>

  <!-- Right-Right: Need customisation NO -->
  <!-- Direct to BUY outcome -->

  <!-- Lines from Level 3 -->
  <line x1="50" y1="231" x2="30" y2="270" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="120" y1="231" x2="140" y2="270" stroke="#EF4444" stroke-width="1.5"/>
  <text x="32" y="252" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#22C55E">YES</text>
  <text x="138" y="252" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#EF4444">NO</text>

  <line x1="245" y1="231" x2="225" y2="270" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="315" y1="231" x2="335" y2="270" stroke="#EF4444" stroke-width="1.5"/>
  <text x="227" y="252" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#22C55E">YES</text>
  <text x="333" y="252" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#EF4444">NO</text>

  <line x1="485" y1="231" x2="465" y2="270" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="555" y1="231" x2="575" y2="270" stroke="#EF4444" stroke-width="1.5"/>
  <text x="467" y="252" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#22C55E">HIGH</text>
  <text x="573" y="252" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#EF4444">LOW</text>

  <line x1="720" y1="231" x2="710" y2="270" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Outcome boxes -->
  <!-- BUILD outcomes (green) -->
  <rect x="5" y="272" width="55" height="50" rx="8" fill="#22C55E" filter="url(#shadow)"/>
  <text x="32" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">BUILD</text>
  <text x="32" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#DCFCE7">In-house</text>

  <rect x="200" y="272" width="55" height="50" rx="8" fill="#22C55E" filter="url(#shadow)"/>
  <text x="227" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">BUILD</text>
  <text x="227" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#DCFCE7">In-house</text>

  <rect x="548" y="272" width="55" height="50" rx="8" fill="#22C55E" filter="url(#shadow)"/>
  <text x="575" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">BUILD</text>
  <text x="575" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#DCFCE7">Custom</text>

  <!-- HYBRID outcomes (amber) -->
  <rect x="110" y="272" width="70" height="50" rx="8" fill="#F59E0B" filter="url(#shadow)"/>
  <text x="145" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">HYBRID</text>
  <text x="145" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#FEF3C7">Buy + adapt</text>

  <rect x="434" y="272" width="70" height="50" rx="8" fill="#F59E0B" filter="url(#shadow)"/>
  <text x="469" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">HYBRID</text>
  <text x="469" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#FEF3C7">API + custom</text>

  <!-- BUY outcomes (blue) -->
  <rect x="310" y="272" width="55" height="50" rx="8" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="337" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">BUY</text>
  <text x="337" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#DBEAFE">SaaS/API</text>

  <rect x="683" y="272" width="55" height="50" rx="8" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="710" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">BUY</text>
  <text x="710" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#DBEAFE">Off-shelf</text>

  <!-- Legend -->
  <rect x="20" y="345" width="760" height="45" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="35" y="360" width="14" height="14" rx="4" fill="#22C55E"/>
  <text x="55" y="371" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Build: Full control, higher cost, longer timeline</text>
  <rect x="300" y="360" width="14" height="14" rx="4" fill="#F59E0B"/>
  <text x="320" y="371" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Hybrid: Balance of control and speed</text>
  <rect x="545" y="360" width="14" height="14" rx="4" fill="#3B82F6"/>
  <text x="565" y="371" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Buy: Fast to deploy, less control</text>
</svg>
