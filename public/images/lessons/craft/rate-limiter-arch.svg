<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FAFAFE"/>
  <text x="400" y="30" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700" fill="#1E1B4B">Distributed Rate Limiter — Architecture</text>

  <!-- Client -->
  <rect x="20" y="80" width="100" height="50" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="70" y="102" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#5B21B6">Client</text>
  <text x="70" y="118" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#7C3AED">API Consumer</text>

  <!-- Arrow Client → Gateway -->
  <line x1="120" y1="105" x2="168" y2="105" stroke="#8B5CF6" stroke-width="2" marker-end="url(#rlPurple)"/>
  <text x="144" y="98" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#8B5CF6">HTTPS</text>

  <!-- API Gateway -->
  <rect x="170" y="65" width="140" height="80" rx="10" fill="#F0FDFA" stroke="#14B8A6" stroke-width="2"/>
  <text x="240" y="88" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#0F766E">API Gateway</text>
  <text x="240" y="104" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#0D9488">Authentication</text>
  <text x="240" y="118" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#0D9488">Request Routing</text>
  <text x="240" y="132" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#0D9488">TLS Termination</text>

  <!-- Arrow Gateway → Rate Limiter Middleware -->
  <line x1="310" y1="105" x2="358" y2="105" stroke="#14B8A6" stroke-width="2" marker-end="url(#rlTeal)"/>

  <!-- Rate Limiter Middleware -->
  <rect x="360" y="55" width="160" height="100" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2.5"/>
  <text x="440" y="78" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#C2410C">Rate Limiter</text>
  <text x="440" y="96" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#EA580C">Token Bucket / Sliding</text>
  <text x="440" y="110" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#EA580C">Window Algorithm</text>
  <line x1="380" y1="122" x2="520" y2="122" stroke="#FDBA74" stroke-width="0.5"/>
  <text x="440" y="138" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#EA580C">Per-user / Per-IP / Per-API key</text>
  <text x="440" y="150" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#EA580C">Check quota before forwarding</text>

  <!-- Arrow Rate Limiter → Backend (allowed) -->
  <line x1="520" y1="90" x2="578" y2="90" stroke="#10B981" stroke-width="2" marker-end="url(#rlGreen)"/>
  <text x="550" y="82" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#10B981">ALLOW</text>

  <!-- Arrow Rate Limiter → Rejected -->
  <line x1="440" y1="155" x2="440" y2="188" stroke="#EF4444" stroke-width="2" marker-end="url(#rlRed)"/>

  <!-- Rejected response -->
  <rect x="370" y="190" width="140" height="40" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="440" y="208" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#DC2626">429 Rate Limited</text>
  <text x="440" y="222" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#EF4444">Retry-After: 30s</text>

  <!-- Backend Services -->
  <rect x="580" y="55" width="130" height="40" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="645" y="73" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#5B21B6">URL Service</text>
  <text x="645" y="88" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#7C3AED">Create / Redirect</text>

  <rect x="580" y="105" width="130" height="40" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="645" y="123" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#5B21B6">ML Service</text>
  <text x="645" y="138" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#7C3AED">Inference API</text>

  <!-- Redis Cluster (shared state) -->
  <rect x="280" y="280" width="240" height="110" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="400" y="305" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700" fill="#C2410C">Redis Cluster</text>
  <text x="400" y="322" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#EA580C">Shared Rate Limit State</text>
  <!-- Redis nodes -->
  <rect x="296" y="334" width="60" height="36" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1"/>
  <text x="326" y="350" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#C2410C">Node 1</text>
  <text x="326" y="363" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#EA580C">Primary</text>
  <rect x="370" y="334" width="60" height="36" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1"/>
  <text x="400" y="350" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#C2410C">Node 2</text>
  <text x="400" y="363" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#EA580C">Replica</text>
  <rect x="444" y="334" width="60" height="36" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1"/>
  <text x="474" y="350" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#C2410C">Node 3</text>
  <text x="474" y="363" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#EA580C">Replica</text>

  <!-- Arrow Rate Limiter → Redis -->
  <line x1="420" y1="155" x2="410" y2="278" stroke="#F97316" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#rlOrange)"/>
  <text x="430" y="220" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#EA580C">INCR key</text>
  <text x="430" y="232" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#EA580C">EXPIRE ttl</text>

  <!-- Data format in Redis -->
  <rect x="560" y="280" width="220" height="110" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="670" y="300" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#374151">Redis Key Structure</text>
  <text x="580" y="320" font-family="'Courier New',monospace" font-size="9" fill="#6B7280">rate:user123:min:14  = 45</text>
  <text x="580" y="336" font-family="'Courier New',monospace" font-size="9" fill="#6B7280">rate:user123:min:15  = 12</text>
  <text x="580" y="352" font-family="'Courier New',monospace" font-size="9" fill="#6B7280">rate:api_key_x:hr:9 = 980</text>
  <text x="580" y="372" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#9CA3AF">TTL auto-expires old windows</text>
  <text x="580" y="384" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#9CA3AF">Lua script for atomic check+incr</text>

  <!-- AI Adaptive component -->
  <rect x="30" y="290" width="200" height="100" rx="12" fill="#FDF2F8" stroke="#EC4899" stroke-width="2"/>
  <text x="130" y="312" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#BE185D">AI Adaptive Limiter</text>
  <text x="130" y="330" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#DB2777">ML anomaly detection</text>
  <text x="130" y="346" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#DB2777">Dynamic threshold tuning</text>
  <text x="130" y="362" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#DB2777">Bot vs human classifier</text>
  <text x="130" y="378" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#EC4899">Adjusts limits in real-time</text>
  <!-- Arrow AI → Redis -->
  <line x1="230" y1="335" x2="278" y2="335" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#rlPink)"/>

  <!-- Bottom legend -->
  <rect x="30" y="420" width="740" height="65" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="50" y="440" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#374151">Rate Limit Headers (Response)</text>
  <text x="50" y="458" font-family="'Courier New',monospace" font-size="9" fill="#6B7280">X-RateLimit-Limit: 1000 | X-RateLimit-Remaining: 955 | X-RateLimit-Reset: 1672531200</text>
  <text x="50" y="476" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#9CA3AF">OpenAI: 60 RPM (free), 10K RPM (tier 5) | Claude: 50 RPM (free), 4K RPM (scale) | Stripe: 100/sec per key</text>

  <defs>
    <marker id="rlPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8B5CF6"/></marker>
    <marker id="rlTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#14B8A6"/></marker>
    <marker id="rlGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#10B981"/></marker>
    <marker id="rlRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#EF4444"/></marker>
    <marker id="rlOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F97316"/></marker>
    <marker id="rlPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#EC4899"/></marker>
  </defs>
</svg>
