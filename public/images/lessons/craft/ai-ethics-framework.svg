<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1E293B">Responsible AI Framework</text>
  <text x="400" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Five pillars every AI leader must address</text>

  <!-- Central hub -->
  <circle cx="400" cy="210" r="60" fill="#EC4899" filter="url(#shadow)"/>
  <circle cx="400" cy="210" r="55" fill="#EC4899"/>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">RESPONSIBLE</text>
  <text x="400" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">AI</text>
  <text x="400" y="234" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FDF2F8">Every decision matters</text>

  <!-- Spoke lines -->
  <line x1="345" y1="185" x2="195" y2="120" stroke="#F9A8D4" stroke-width="2"/>
  <line x1="455" y1="185" x2="605" y2="120" stroke="#F9A8D4" stroke-width="2"/>
  <line x1="340" y1="225" x2="140" y2="310" stroke="#F9A8D4" stroke-width="2"/>
  <line x1="460" y1="225" x2="660" y2="310" stroke="#F9A8D4" stroke-width="2"/>
  <line x1="400" y1="270" x2="400" y2="330" stroke="#F9A8D4" stroke-width="2"/>

  <!-- Spoke 1: Fairness (top-left) -->
  <rect x="55" y="65" width="180" height="110" rx="10" fill="#FFFFFF" stroke="#EC4899" stroke-width="2" filter="url(#shadow)"/>
  <rect x="55" y="65" width="180" height="32" rx="10" fill="#EC4899"/>
  <rect x="55" y="82" width="180" height="15" fill="#EC4899"/>
  <text x="145" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Fairness</text>
  <text x="70" y="115" font-family="system-ui, sans-serif" font-size="10" fill="#475569" font-weight="600">Key Questions:</text>
  <circle cx="72" cy="130" r="2" fill="#EC4899"/>
  <text x="80" y="134" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Bias in training data?</text>
  <circle cx="72" cy="146" r="2" fill="#EC4899"/>
  <text x="80" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Equal outcomes across groups?</text>
  <circle cx="72" cy="162" r="2" fill="#EC4899"/>
  <text x="80" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Regular bias audits?</text>

  <!-- Spoke 2: Transparency (top-right) -->
  <rect x="565" y="65" width="180" height="110" rx="10" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="565" y="65" width="180" height="32" rx="10" fill="#3B82F6"/>
  <rect x="565" y="82" width="180" height="15" fill="#3B82F6"/>
  <text x="655" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Transparency</text>
  <text x="580" y="115" font-family="system-ui, sans-serif" font-size="10" fill="#475569" font-weight="600">Key Questions:</text>
  <circle cx="582" cy="130" r="2" fill="#3B82F6"/>
  <text x="590" y="134" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Can decisions be explained?</text>
  <circle cx="582" cy="146" r="2" fill="#3B82F6"/>
  <text x="590" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Users know AI is involved?</text>
  <circle cx="582" cy="162" r="2" fill="#3B82F6"/>
  <text x="590" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Model documentation exists?</text>

  <!-- Spoke 3: Privacy (bottom-left) -->
  <rect x="20" y="270" width="180" height="110" rx="10" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="270" width="180" height="32" rx="10" fill="#22C55E"/>
  <rect x="20" y="287" width="180" height="15" fill="#22C55E"/>
  <text x="110" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Privacy</text>
  <text x="35" y="320" font-family="system-ui, sans-serif" font-size="10" fill="#475569" font-weight="600">Key Questions:</text>
  <circle cx="37" cy="335" r="2" fill="#22C55E"/>
  <text x="45" y="339" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Data minimisation applied?</text>
  <circle cx="37" cy="351" r="2" fill="#22C55E"/>
  <text x="45" y="355" font-family="system-ui, sans-serif" font-size="10" fill="#475569">GDPR/CCPA compliant?</text>
  <circle cx="37" cy="367" r="2" fill="#22C55E"/>
  <text x="45" y="371" font-family="system-ui, sans-serif" font-size="10" fill="#475569">User consent obtained?</text>

  <!-- Spoke 4: Safety (bottom-right) -->
  <rect x="600" y="270" width="180" height="110" rx="10" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <rect x="600" y="270" width="180" height="32" rx="10" fill="#F59E0B"/>
  <rect x="600" y="287" width="180" height="15" fill="#F59E0B"/>
  <text x="690" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Safety</text>
  <text x="615" y="320" font-family="system-ui, sans-serif" font-size="10" fill="#475569" font-weight="600">Key Questions:</text>
  <circle cx="617" cy="335" r="2" fill="#F59E0B"/>
  <text x="625" y="339" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Failure modes identified?</text>
  <circle cx="617" cy="351" r="2" fill="#F59E0B"/>
  <text x="625" y="355" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Human-in-the-loop?</text>
  <circle cx="617" cy="367" r="2" fill="#F59E0B"/>
  <text x="625" y="371" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Rollback plan exists?</text>

  <!-- Spoke 5: Accountability (bottom-center) -->
  <rect x="310" y="335" width="180" height="60" rx="10" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="310" y="335" width="180" height="32" rx="10" fill="#8B5CF6"/>
  <rect x="310" y="352" width="180" height="15" fill="#8B5CF6"/>
  <text x="400" y="357" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Accountability</text>
  <text x="325" y="384" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Clear ownership | Audit trails | Governance board</text>
</svg>
