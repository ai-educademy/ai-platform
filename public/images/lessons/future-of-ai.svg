<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="fu-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="fu-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="70%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#fu-bg)" rx="20"/>
  <text x="360" y="42" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="700" fill="#4338ca">The Future of AI</text>
  <text x="360" y="64" text-anchor="middle" font-family="system-ui" font-size="13" fill="#6366f1">A timeline from rule-based systems to what lies ahead</text>
  <!-- Timeline line -->
  <line x1="60" y1="200" x2="660" y2="200" stroke="url(#fu-line)" stroke-width="4" stroke-linecap="round"/>
  <!-- Milestone 1: Rules -->
  <circle cx="100" cy="200" r="10" fill="#c7d2fe" stroke="#818cf8" stroke-width="2.5"/>
  <rect x="55" y="115" width="90" height="65" rx="12" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="100" y="142" text-anchor="middle" font-size="20">📏</text>
  <text x="100" y="162" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#4338ca">Rules</text>
  <text x="100" y="174" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">1950s</text>
  <text x="100" y="232" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6366f1">If-then logic</text>
  <!-- Milestone 2: ML -->
  <circle cx="240" cy="200" r="10" fill="#818cf8" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="195" y="115" width="90" height="65" rx="12" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="240" y="142" text-anchor="middle" font-size="20">📊</text>
  <text x="240" y="162" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#4338ca">ML</text>
  <text x="240" y="174" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">1990s</text>
  <text x="240" y="232" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6366f1">Learn from data</text>
  <!-- Milestone 3: Deep Learning -->
  <circle cx="380" cy="200" r="10" fill="#6366f1" stroke="#4338ca" stroke-width="2.5"/>
  <rect x="330" y="115" width="100" height="65" rx="12" fill="#fff" fill-opacity=".85" stroke="#6366f1" stroke-width="1.5"/>
  <text x="380" y="142" text-anchor="middle" font-size="20">🧠</text>
  <text x="380" y="162" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#4338ca">Deep Learning</text>
  <text x="380" y="174" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">2012</text>
  <text x="380" y="232" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6366f1">CNNs · RNNs</text>
  <!-- Milestone 4: LLMs -->
  <circle cx="520" cy="200" r="12" fill="#4338ca" stroke="#4338ca" stroke-width="2.5"/>
  <rect x="470" y="115" width="100" height="65" rx="12" fill="#fff" fill-opacity=".85" stroke="#4338ca" stroke-width="2"/>
  <text x="520" y="142" text-anchor="middle" font-size="20">💬</text>
  <text x="520" y="162" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#4338ca">LLMs</text>
  <text x="520" y="174" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">2020–Now</text>
  <text x="520" y="232" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6366f1">GPT · Claude</text>
  <!-- Milestone 5: AGI? -->
  <circle cx="640" cy="200" r="12" fill="none" stroke="#4338ca" stroke-width="2.5" stroke-dasharray="4 3"/>
  <rect x="595" y="115" width="90" height="65" rx="12" fill="#fff" fill-opacity=".85" stroke="#4338ca" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="640" y="142" text-anchor="middle" font-size="20">🌟</text>
  <text x="640" y="162" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#4338ca">AGI?</text>
  <text x="640" y="174" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">Future</text>
  <text x="640" y="232" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6366f1">Human-level?</text>
  <!-- Bottom insight -->
  <rect x="130" y="295" width="460" height="60" rx="14" fill="#fff" fill-opacity=".6" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="320" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#4338ca">Key Trends Shaping the Future</text>
  <text x="360" y="342" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">🔬 Multimodal · 🌍 Edge AI · 🤝 Collaboration · ⚖️ Regulation</text>
</svg>
