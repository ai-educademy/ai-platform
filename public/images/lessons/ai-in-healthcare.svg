<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#ai-bg)" rx="20"/>
  <text x="360" y="42" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="700" fill="#4338ca">AI in Healthcare</text>
  <text x="360" y="64" text-anchor="middle" font-family="system-ui" font-size="13" fill="#6366f1">AI model analysing X-ray alongside a doctor</text>
  <!-- X-ray placeholder -->
  <rect x="50" y="100" width="160" height="200" rx="14" fill="#1e1b4b" fill-opacity=".85" stroke="#818cf8" stroke-width="2"/>
  <text x="130" y="155" text-anchor="middle" font-size="40">🩻</text>
  <text x="130" y="195" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#c7d2fe">X-Ray Scan</text>
  <rect x="80" y="215" width="100" height="5" rx="2" fill="#818cf8" fill-opacity=".4"/>
  <rect x="80" y="228" width="70" height="5" rx="2" fill="#818cf8" fill-opacity=".3"/>
  <rect x="80" y="241" width="90" height="5" rx="2" fill="#818cf8" fill-opacity=".25"/>
  <text x="130" y="280" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c7d2fe">Patient image data</text>
  <!-- Arrow 1 -->
  <path d="M220 200 L275 200" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  <polygon points="275,193 291,200 275,207" fill="#818cf8"/>
  <!-- AI Analysis box -->
  <rect x="300" y="105" width="170" height="190" rx="16" fill="#fff" fill-opacity=".85" stroke="#6366f1" stroke-width="2"/>
  <text x="385" y="140" text-anchor="middle" font-size="32">🤖</text>
  <text x="385" y="168" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#4338ca">AI Analysis</text>
  <line x1="325" y1="180" x2="445" y2="180" stroke="#e0e7ff" stroke-width="1.5"/>
  <text x="385" y="200" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">✓ Pattern detection</text>
  <text x="385" y="218" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">✓ Anomaly scoring</text>
  <text x="385" y="236" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">✓ Region highlight</text>
  <rect x="330" y="252" width="110" height="28" rx="8" fill="#4338ca" fill-opacity=".12"/>
  <text x="385" y="271" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#4338ca">98.2% Confidence</text>
  <!-- Arrow 2 -->
  <path d="M480 200 L530 200" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  <polygon points="530,193 546,200 530,207" fill="#818cf8"/>
  <!-- Doctor review -->
  <rect x="555" y="105" width="130" height="190" rx="16" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="2"/>
  <text x="620" y="152" text-anchor="middle" font-size="40">👩‍⚕️</text>
  <text x="620" y="185" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#4338ca">Doctor</text>
  <text x="620" y="205" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">Reviews AI</text>
  <text x="620" y="222" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">findings</text>
  <rect x="575" y="240" width="90" height="40" rx="8" fill="#4338ca" fill-opacity=".08"/>
  <text x="620" y="258" text-anchor="middle" font-family="system-ui" font-size="10" fill="#4338ca">Final</text>
  <text x="620" y="272" text-anchor="middle" font-family="system-ui" font-size="10" fill="#4338ca">Diagnosis ✅</text>
  <!-- Bottom note -->
  <rect x="180" y="335" width="360" height="40" rx="12" fill="#4338ca" fill-opacity=".08" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="360" text-anchor="middle" font-family="system-ui" font-size="12" fill="#4338ca">🔑 AI assists — the doctor makes the final call</text>
</svg>
