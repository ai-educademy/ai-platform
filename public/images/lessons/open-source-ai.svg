<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="op-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#op-bg)" rx="20"/>
  <text x="360" y="42" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="700" fill="#4338ca">Open Source AI Ecosystem</text>
  <text x="360" y="64" text-anchor="middle" font-family="system-ui" font-size="13" fill="#6366f1">A connected community of models, data, tools &amp; people</text>
  <!-- Connection lines (behind nodes) -->
  <line x1="360" y1="200" x2="160" y2="140" stroke="#c7d2fe" stroke-width="2.5"/>
  <line x1="360" y1="200" x2="560" y2="140" stroke="#c7d2fe" stroke-width="2.5"/>
  <line x1="360" y1="200" x2="160" y2="290" stroke="#c7d2fe" stroke-width="2.5"/>
  <line x1="360" y1="200" x2="560" y2="290" stroke="#c7d2fe" stroke-width="2.5"/>
  <!-- Cross connections -->
  <line x1="160" y1="140" x2="560" y2="140" stroke="#e0e7ff" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="160" y1="290" x2="560" y2="290" stroke="#e0e7ff" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="160" y1="140" x2="160" y2="290" stroke="#e0e7ff" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="560" y1="140" x2="560" y2="290" stroke="#e0e7ff" stroke-width="1.5" stroke-dasharray="5 4"/>
  <!-- Central Hub -->
  <circle cx="360" cy="200" r="52" fill="#fff" fill-opacity=".9" stroke="#4338ca" stroke-width="3"/>
  <text x="360" y="192" text-anchor="middle" font-size="28">🌐</text>
  <text x="360" y="216" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#4338ca">Open Source</text>
  <text x="360" y="230" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">AI Hub</text>
  <!-- Node 1: Models (top-left) -->
  <circle cx="160" cy="140" r="40" fill="#fff" fill-opacity=".85" stroke="#6366f1" stroke-width="2"/>
  <text x="160" y="133" text-anchor="middle" font-size="22">🧠</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#4338ca">Models</text>
  <text x="160" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">LLaMA · Mistral</text>
  <text x="160" y="208" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">BERT · Whisper</text>
  <!-- Node 2: Data (top-right) -->
  <circle cx="560" cy="140" r="40" fill="#fff" fill-opacity=".85" stroke="#6366f1" stroke-width="2"/>
  <text x="560" y="133" text-anchor="middle" font-size="22">📊</text>
  <text x="560" y="155" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#4338ca">Data</text>
  <text x="560" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">HuggingFace</text>
  <text x="560" y="208" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">Kaggle · Common Crawl</text>
  <!-- Node 3: Tools (bottom-left) -->
  <circle cx="160" cy="290" r="40" fill="#fff" fill-opacity=".85" stroke="#6366f1" stroke-width="2"/>
  <text x="160" y="283" text-anchor="middle" font-size="22">🔧</text>
  <text x="160" y="305" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#4338ca">Tools</text>
  <text x="160" y="345" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">PyTorch · TensorFlow</text>
  <text x="160" y="358" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">LangChain · vLLM</text>
  <!-- Node 4: Community (bottom-right) -->
  <circle cx="560" cy="290" r="40" fill="#fff" fill-opacity=".85" stroke="#6366f1" stroke-width="2"/>
  <text x="560" y="283" text-anchor="middle" font-size="22">👥</text>
  <text x="560" y="305" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#4338ca">Community</text>
  <text x="560" y="345" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">Contributors · Papers</text>
  <text x="560" y="358" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">Courses · Forums</text>
  <!-- Bottom note -->
  <rect x="215" y="370" width="290" height="24" rx="8" fill="#4338ca" fill-opacity=".08"/>
  <text x="360" y="387" text-anchor="middle" font-family="system-ui" font-size="10" fill="#4338ca">🔓 Open collaboration accelerates AI progress</text>
</svg>
