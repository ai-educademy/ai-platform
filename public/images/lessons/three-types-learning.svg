<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" fill="none">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="720" y2="260">
      <stop offset="0%" stop-color="#ecfdf5"/><stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
  </defs>
  <rect width="720" height="260" fill="url(#tbg)" rx="20"/>
  <text x="360" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#047857">Three Ways Machines Learn</text>
  <!-- Card 1: Supervised -->
  <g transform="translate(20,50)">
    <rect width="215" height="190" rx="16" fill="white" stroke="#86efac" stroke-width="2"/>
    <rect width="215" height="40" rx="16" fill="#ecfdf5"/>
    <!-- Book icon -->
    <g transform="translate(22,10)">
      <rect x="2" y="2" width="16" height="18" rx="2" stroke="#047857" stroke-width="1.5" fill="none"/>
      <line x1="10" y1="2" x2="10" y2="20" stroke="#047857" stroke-width="1.5"/>
      <line x1="4" y1="8" x2="8" y2="8" stroke="#047857" stroke-width="1" stroke-linecap="round"/>
      <line x1="12" y1="8" x2="16" y2="8" stroke="#047857" stroke-width="1" stroke-linecap="round"/>
      <line x1="4" y1="12" x2="8" y2="12" stroke="#047857" stroke-width="1" stroke-linecap="round"/>
      <line x1="12" y1="12" x2="16" y2="12" stroke="#047857" stroke-width="1" stroke-linecap="round"/>
    </g>
    <text x="52" y="27" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#047857">Supervised</text>
    <text x="108" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#374151">"Learning with a teacher"</text>
    <!-- Visual: flashcard with cat silhouette -->
    <g transform="translate(30,85)">
      <rect width="60" height="45" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <!-- Cat face -->
      <circle cx="30" cy="22" r="10" stroke="#047857" stroke-width="1.5" fill="none"/>
      <polygon points="22,15 24,7 28,13" fill="#047857"/>
      <polygon points="32,13 36,7 38,15" fill="#047857"/>
    </g>
    <text x="105" y="112" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">→</text>
    <g transform="translate(115,85)">
      <rect width="70" height="45" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="35" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#047857">"Cat!"  ✓</text>
    </g>
    <text x="108" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Example + answer = learning</text>
    <text x="108" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af">e.g. Spam filters, face ID</text>
  </g>
  <!-- Card 2: Unsupervised -->
  <g transform="translate(252,50)">
    <rect width="215" height="190" rx="16" fill="white" stroke="#c7d2fe" stroke-width="2"/>
    <rect width="215" height="40" rx="16" fill="#ede9fe"/>
    <!-- Magnifying glass icon -->
    <g transform="translate(22,10)">
      <circle cx="10" cy="10" r="7" stroke="#4338ca" stroke-width="1.5" fill="none"/>
      <line x1="15" y1="15" x2="19" y2="19" stroke="#4338ca" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="52" y="27" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Unsupervised</text>
    <text x="108" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#374151">"Learning by exploring"</text>
    <!-- Visual: colored sorting clusters -->
    <g transform="translate(25,85)">
      <circle cx="20" cy="20" r="12" fill="#c7d2fe" stroke="#818cf8" stroke-width="1"/>
      <rect x="14" y="14" width="12" height="12" rx="2" stroke="#4338ca" stroke-width="1.2" fill="none"/>
      <circle cx="55" cy="20" r="12" fill="#c7d2fe" stroke="#818cf8" stroke-width="1"/>
      <rect x="49" y="11" width="12" height="15" rx="2" stroke="#4338ca" stroke-width="1.2" fill="none"/>
      <circle cx="90" cy="20" r="12" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
      <rect x="84" y="12" width="12" height="14" rx="2" stroke="#92400e" stroke-width="1.2" fill="none"/>
      <circle cx="125" cy="20" r="12" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
      <path d="M119,26 L125,10 L131,26 Z" stroke="#92400e" stroke-width="1.2" fill="none"/>
      <circle cx="160" cy="20" r="12" fill="#bbf7d0" stroke="#10b981" stroke-width="1"/>
      <rect x="153" y="12" width="14" height="16" rx="3" stroke="#047857" stroke-width="1.2" fill="none"/>
    </g>
    <text x="108" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Finds hidden groups itself</text>
    <text x="108" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af">e.g. Customer segments</text>
  </g>
  <!-- Card 3: Reinforcement -->
  <g transform="translate(484,50)">
    <rect width="215" height="190" rx="16" fill="white" stroke="#fde68a" stroke-width="2"/>
    <rect width="215" height="40" rx="16" fill="#fef3c7"/>
    <!-- Game controller icon -->
    <g transform="translate(22,10)">
      <rect x="2" y="6" width="18" height="10" rx="5" stroke="#92400e" stroke-width="1.5" fill="none"/>
      <line x1="8" y1="9" x2="8" y2="13" stroke="#92400e" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="6" y1="11" x2="10" y2="11" stroke="#92400e" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="15" cy="9" r="1" fill="#92400e"/>
      <circle cx="17" cy="11" r="1" fill="#92400e"/>
    </g>
    <text x="52" y="27" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#92400e">Reinforcement</text>
    <text x="108" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#374151">"Learning from trial &amp; error"</text>
    <!-- Visual: reward path -->
    <g transform="translate(30,85)">
      <rect width="150" height="45" rx="6" fill="#fef3c7" stroke="#fbbf24"/>
      <!-- Bicycle icon -->
      <circle cx="20" cy="28" r="8" stroke="#92400e" stroke-width="1.5" fill="none"/>
      <circle cx="20" cy="28" r="2" fill="#92400e"/>
      <text x="45" y="30" font-family="system-ui,sans-serif" font-size="10" fill="#92400e">Fail → adjust →</text>
      <!-- Trophy icon -->
      <path d="M120,18 L120,26 Q120,32 126,32 Q132,32 132,26 L132,18 Z" stroke="#92400e" stroke-width="1.5" fill="#fde68a"/>
      <line x1="126" y1="32" x2="126" y2="36" stroke="#92400e" stroke-width="1.5"/>
      <line x1="121" y1="36" x2="131" y2="36" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="108" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Try, fail, improve, repeat</text>
    <text x="108" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af">e.g. Game AI, robotics</text>
  </g>
</svg>
