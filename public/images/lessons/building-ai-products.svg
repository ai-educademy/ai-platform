<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="bu-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bu-bg)" rx="20"/>
  <text x="360" y="42" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="700" fill="#4338ca">Building AI Products</text>
  <text x="360" y="64" text-anchor="middle" font-family="system-ui" font-size="13" fill="#6366f1">From idea to production in 5 stages</text>
  <!-- Connector line -->
  <line x1="100" y1="195" x2="620" y2="195" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round"/>
  <!-- Stage 1: Idea -->
  <circle cx="100" cy="195" r="8" fill="#4338ca"/>
  <rect x="45" y="110" width="110" height="65" rx="12" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="2"/>
  <text x="100" y="137" text-anchor="middle" font-size="22">💡</text>
  <text x="100" y="160" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#4338ca">Idea</text>
  <text x="100" y="225" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">Define the</text>
  <text x="100" y="238" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">problem</text>
  <!-- Stage 2: Prototype -->
  <circle cx="230" cy="195" r="8" fill="#4338ca"/>
  <rect x="175" y="110" width="110" height="65" rx="12" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="2"/>
  <text x="230" y="137" text-anchor="middle" font-size="22">🔧</text>
  <text x="230" y="160" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#4338ca">Prototype</text>
  <text x="230" y="225" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">Build MVP &amp;</text>
  <text x="230" y="238" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">train model</text>
  <!-- Stage 3: Testing -->
  <circle cx="360" cy="195" r="8" fill="#4338ca"/>
  <rect x="305" y="110" width="110" height="65" rx="12" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="2"/>
  <text x="360" y="137" text-anchor="middle" font-size="22">🧪</text>
  <text x="360" y="160" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#4338ca">Testing</text>
  <text x="360" y="225" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">Evaluate &amp;</text>
  <text x="360" y="238" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">validate</text>
  <!-- Stage 4: Deploy -->
  <circle cx="490" cy="195" r="8" fill="#4338ca"/>
  <rect x="435" y="110" width="110" height="65" rx="12" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="2"/>
  <text x="490" y="137" text-anchor="middle" font-size="22">🚀</text>
  <text x="490" y="160" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#4338ca">Deploy</text>
  <text x="490" y="225" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">Ship to</text>
  <text x="490" y="238" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">production</text>
  <!-- Stage 5: Monitor -->
  <circle cx="620" cy="195" r="8" fill="#4338ca"/>
  <rect x="565" y="110" width="110" height="65" rx="12" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="2"/>
  <text x="620" y="137" text-anchor="middle" font-size="22">📈</text>
  <text x="620" y="160" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#4338ca">Monitor</text>
  <text x="620" y="225" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">Track &amp;</text>
  <text x="620" y="238" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">improve</text>
  <!-- Feedback loop arrow -->
  <path d="M620 250 C620 310, 100 310, 100 250" stroke="#818cf8" stroke-width="2" fill="none" stroke-dasharray="6 4" stroke-linecap="round"/>
  <polygon points="104,254 96,246 108,246" fill="#818cf8"/>
  <text x="360" y="300" text-anchor="middle" font-family="system-ui" font-size="11" fill="#818cf8">♻️ Continuous feedback loop</text>
  <!-- Bottom summary -->
  <rect x="130" y="335" width="460" height="40" rx="10" fill="#fff" fill-opacity=".6" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="360" text-anchor="middle" font-family="system-ui" font-size="11" fill="#4338ca">📥 Data &amp; Requirements → 🔄 Train · Test · Iterate → 📊 Accuracy · Latency · Cost</text>
</svg>
