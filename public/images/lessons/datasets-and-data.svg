<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="da-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="da-acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#da-bg)" rx="20"/>
  <text x="360" y="45" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="700" fill="#4338ca">Data Flows Into an AI Model</text>
  <!-- Raw data sources -->
  <rect x="40" y="100" width="150" height="200" rx="16" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="2"/>
  <text x="115" y="135" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#4338ca">Raw Data</text>
  <text x="115" y="180" text-anchor="middle" font-size="32">📊</text>
  <text x="115" y="220" text-anchor="middle" font-size="32">📷</text>
  <text x="115" y="260" text-anchor="middle" font-size="32">📝</text>
  <text x="115" y="285" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">Tables · Images · Text</text>
  <!-- Arrow 1 -->
  <path d="M200 200 L270 200" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  <polygon points="270,192 288,200 270,208" fill="#818cf8"/>
  <text x="244" y="188" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">clean</text>
  <!-- Pipeline -->
  <rect x="295" y="140" width="130" height="120" rx="16" fill="url(#da-acc)" fill-opacity=".12" stroke="#6366f1" stroke-width="2"/>
  <text x="360" y="175" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#4338ca">Pipeline</text>
  <text x="360" y="200" text-anchor="middle" font-size="28">⚙️</text>
  <text x="360" y="240" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">Transform &amp; Split</text>
  <!-- Arrow 2 -->
  <path d="M435 200 L490 200" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  <polygon points="490,192 508,200 490,208" fill="#818cf8"/>
  <!-- AI Model -->
  <rect x="515" y="120" width="160" height="160" rx="16" fill="#fff" fill-opacity=".85" stroke="#4338ca" stroke-width="2.5"/>
  <text x="595" y="160" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#4338ca">AI Model</text>
  <text x="595" y="205" text-anchor="middle" font-size="40">🤖</text>
  <text x="595" y="255" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">Learns Patterns</text>
  <!-- Output -->
  <path d="M595 290 L595 330" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  <polygon points="587,330 595,348 603,330" fill="#818cf8"/>
  <rect x="535" y="350" width="120" height="36" rx="10" fill="#4338ca"/>
  <text x="595" y="374" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#fff">Predictions ✨</text>
</svg>
