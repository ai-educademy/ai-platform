<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="al-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#al-bg)" rx="20"/>
  <text x="360" y="42" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="700" fill="#4338ca">Types of Algorithms</text>
  <text x="360" y="64" text-anchor="middle" font-family="system-ui" font-size="13" fill="#6366f1">Step-by-step instructions to solve problems</text>
  <!-- Card 1: Search -->
  <rect x="40" y="90" width="200" height="270" rx="16" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="2"/>
  <text x="140" y="130" text-anchor="middle" font-size="36">🔍</text>
  <text x="140" y="162" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#4338ca">Search</text>
  <text x="140" y="182" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">Find items in data</text>
  <line x1="70" y1="196" x2="210" y2="196" stroke="#e0e7ff" stroke-width="1.5"/>
  <!-- Search example: array with target -->
  <rect x="60" y="210" width="28" height="28" rx="4" fill="#e0e7ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="74" y="229" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">2</text>
  <rect x="92" y="210" width="28" height="28" rx="4" fill="#e0e7ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="106" y="229" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">5</text>
  <rect x="124" y="210" width="28" height="28" rx="4" fill="#6366f1" stroke="#4338ca" stroke-width="1.5"/>
  <text x="138" y="229" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#fff">7</text>
  <rect x="156" y="210" width="28" height="28" rx="4" fill="#e0e7ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="170" y="229" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">9</text>
  <rect x="188" y="210" width="28" height="28" rx="4" fill="#e0e7ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="202" y="229" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">11</text>
  <text x="140" y="262" text-anchor="middle" font-family="system-ui" font-size="10" fill="#4338ca">↑ Found 7!</text>
  <text x="140" y="290" text-anchor="middle" font-family="system-ui" font-size="10" fill="#818cf8">Binary Search · O(log n)</text>
  <!-- Card 2: Sort -->
  <rect x="260" y="90" width="200" height="270" rx="16" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="2"/>
  <text x="360" y="130" text-anchor="middle" font-size="36">📊</text>
  <text x="360" y="162" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#4338ca">Sort</text>
  <text x="360" y="182" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">Arrange in order</text>
  <line x1="290" y1="196" x2="430" y2="196" stroke="#e0e7ff" stroke-width="1.5"/>
  <!-- Sort example: bars -->
  <rect x="290" y="238" width="20" height="16" rx="3" fill="#c7d2fe"/>
  <rect x="316" y="226" width="20" height="28" rx="3" fill="#818cf8"/>
  <rect x="342" y="218" width="20" height="36" rx="3" fill="#6366f1"/>
  <rect x="368" y="214" width="20" height="40" rx="3" fill="#4338ca"/>
  <rect x="394" y="206" width="20" height="48" rx="3" fill="#4338ca"/>
  <text x="360" y="278" text-anchor="middle" font-family="system-ui" font-size="10" fill="#4338ca">Sorted ✓</text>
  <text x="360" y="306" text-anchor="middle" font-family="system-ui" font-size="10" fill="#818cf8">Merge Sort · O(n log n)</text>
  <!-- Card 3: Optimise -->
  <rect x="480" y="90" width="200" height="270" rx="16" fill="#fff" fill-opacity=".85" stroke="#c7d2fe" stroke-width="2"/>
  <text x="580" y="130" text-anchor="middle" font-size="36">⚡</text>
  <text x="580" y="162" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#4338ca">Optimise</text>
  <text x="580" y="182" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">Find the best solution</text>
  <line x1="510" y1="196" x2="650" y2="196" stroke="#e0e7ff" stroke-width="1.5"/>
  <!-- Optimise example: gradient descent curve -->
  <path d="M510 245 Q540 210 560 230 Q580 250 600 215 Q620 235 650 220" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="600" cy="215" r="6" fill="#4338ca"/>
  <text x="600" y="205" text-anchor="middle" font-family="system-ui" font-size="9" fill="#4338ca">min</text>
  <text x="580" y="278" text-anchor="middle" font-family="system-ui" font-size="10" fill="#4338ca">↓ Find minimum</text>
  <text x="580" y="306" text-anchor="middle" font-family="system-ui" font-size="10" fill="#818cf8">Gradient Descent · Iterative</text>
</svg>
