version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "rameshreddy-adutla"
    labels:
      - "dependencies"
      - "security"
    groups:
      production:
        dependency-type: "production"
      development:
        dependency-type: "development"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "rameshreddy-adutla"
    labels:
      - "ci"
      - "security"
